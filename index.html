<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ALTIS COMMAND TERMINAL | TACTICAL DIRECTION</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff41; --blue: #00d2ff; --red: #ff3e3e; --orange: #ff9d00; --bg: #05070a; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; }
        #app { display: flex; height: 100vh; }
        #sidebar { width: 280px; background: linear-gradient(135deg, #10141d 0%, #05070a 100%); border-right: 4px solid #1a222d; padding: 15px; display: flex; flex-direction: column; z-index: 1001; overflow-y: auto; box-shadow: inset -10px 0 20px rgba(0,0,0,0.8); }
        .header { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.1rem; text-align: center; margin-bottom: 15px; letter-spacing: 2px; text-shadow: 0 0 8px var(--primary); animation: glitch 4s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 2% { transform: translate(2px, -1px); text-shadow: 2px 0 var(--red), -2px 0 var(--blue); opacity: 0.8; } 100% { transform: translate(0); } }
        .section-label { font-size: 0.6rem; color: #555; text-transform: uppercase; margin: 12px 0 6px; font-weight: bold; border-bottom: 1px solid #1a222d; padding-bottom: 3px; }
        
        /* Rotation UI */
        .rotation-control { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 4px; border: 1px solid #333; margin-bottom: 10px; text-align: center; }
        .rot-arrow { font-size: 1.5rem; color: var(--primary); display: inline-block; transition: transform 0.1s; }
        
        .bookmark-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
        .btn-jump { background: #111; border: 1px solid #333; color: #8892b0; font-size: 0.62rem; padding: 6px; cursor: pointer; border-radius: 3px; font-weight: bold; }
        .btn-jump:hover { border-color: var(--blue); color: white; }
        
        .grid-icons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .icon-btn { background: rgba(255,255,255,0.03); border: 1px solid #2a3544; padding: 8px; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .icon-btn.active { border-color: var(--blue); background: rgba(0, 210, 255, 0.1); }
        .icon-btn img { width: 30px; height: auto; margin-bottom: 5px; }

        .mute-btn { background: #111; border: 1px solid #333; cursor: pointer; font-size: 1.1rem; padding: 2px 8px; border-radius: 4px; color: white; }
        #map { flex-grow: 1; background: #000; cursor: crosshair; }
        
        /* Tactical Marker Styles */
        .tactical-marker-container { position: relative; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }
        .dir-arrow { position: absolute; top: -15px; font-size: 20px; font-weight: bold; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; transform-origin: 50% 35px; pointer-events: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="header">ALTIS COM</div>
        
        <div class="section-label">DIRECTION DU MOUVEMENT</div>
        <div class="rotation-control">
            <div style="margin-bottom:5px;"><span id="arrow-ui" class="rot-arrow">↑</span></div>
            <input type="range" id="rotSlider" min="0" max="360" value="0" step="15" oninput="updateRotation(this.value)" style="width:100%">
            <div id="rotVal" style="font-size:0.6rem; color:var(--primary)">0° (NORD)</div>
        </div>

        <div class="section-label">SIGNETS</div>
        <div class="bookmark-grid">
            <button class="btn-jump" onclick="jumpTo([596, 202])">KAVALA</button>
            <button class="btn-jump" onclick="jumpTo([565, 1089])">PYRGOS</button>
            <button class="btn-jump" onclick="jumpTo([987, 891])">ATHIRA</button>
            <button class="btn-jump" onclick="jumpTo([851, 931])">AIRPORT</button>
        </div>

        <div class="section-label">UNITÉS</div>
        <div class="grid-icons">
            <button class="icon-btn active" onclick="setType('Infantry', this)"><img src="Icons/Infantry.png"><span>INFANTERIE</span></button>
            <button class="icon-btn" onclick="setType('Vehicule', this)"><img src="Icons/Vehicule.png"><span>VHC LÉGER</span></button>
            <button class="icon-btn" onclick="setType('HeavyArmor', this)"><img src="Icons/HeavyArmor.png"><span>BLINDÉ</span></button>
            <button class="icon-btn" onclick="setType('Attackhelicopter', this)"><img src="Icons/Attackhelicopter.png"><span>HÉLICO</span></button>
            <button class="icon-btn" onclick="setType('Dead', this)"><img src="Icons/Dead.png"><span>KIA</span></button>
            <button class="icon-btn" onclick="setType('Dot', this)"><div style="width:12px;height:12px;background:white;border-radius:50%;margin-bottom:5px;"></div><span>POINT</span></button>
        </div>

        <div class="section-label">COULEUR</div>
        <div class="color-picker" style="display:grid; grid-template-columns:repeat(5, 1fr); gap:4px">
            <div class="color-dot active" style="background: var(--primary);" onclick="setColor('#00ff41', this)"></div>
            <div class="color-dot" style="background: var(--blue);" onclick="setColor('#00d2ff', this)"></div>
            <div class="color-dot" style="background: var(--red);" onclick="setColor('#ff3e3e', this)"></div>
            <div class="color-dot" style="background: var(--orange);" onclick="setColor('#ff9d00', this)"></div>
            <div class="color-dot" style="background: #ffffff;" onclick="setColor('#ffffff', this)"></div>
        </div>

        <div class="section-label">AUDIO</div>
        <div style="display:flex; align-items:center; gap:10px; background:rgba(0,0,0,0.3); padding:10px; border-radius:4px;">
            <button id="mute-btn" class="mute-btn" onclick="toggleMute()">🔊</button>
            <input type="range" id="volSlider" min="0" max="1" step="0.1" value="0.5" style="flex-grow:1">
        </div>

        <button class="btn-util" style="margin-top:15px" onclick="setType('zone', this)">⬢ ZONE TACTIQUE</button>
        <button class="btn-util" style="color:var(--red); border-color:var(--red); margin-top:auto" onclick="clearAll()">WIPE TERMINAL</button>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -3, maxZoom: 3, zoomControl: false });
    const bounds = [[0, 0], [1512, 2048]];
    L.imageOverlay('altis.webp', bounds).addTo(map);
    map.fitBounds(bounds);

    let currentType = 'Infantry', currentColor = '#00ff41', currentRot = 0, isMuted = false, isSaving = false;
    let renderedMarkers = {}, lastCount = 0;

    function updateRotation(val) {
        currentRot = val;
        document.getElementById('rotVal').innerText = val + "°";
        document.getElementById('arrow-ui').style.transform = `rotate(${val}deg)`;
    }

    const iconFiles = {
        'Infantry': { blue: 'Icons/Infantry.png', red: 'Icons/Infantry2.png' },
        'Vehicule': { blue: 'Icons/Vehicule.png', red: 'Icons/Vehicule2.png' },
        'HeavyArmor': { blue: 'Icons/HeavyArmor.png', red: 'Icons/HeavyArmor2.png' },
        'Attackhelicopter': { blue: 'Icons/Attackhelicopter.png', red: 'Icons/Attackhelicopter2.png' },
        'Dead': { any: 'Icons/Dead.png' },
        'Dot': { isVector: true }
    };

    function toggleMute() { isMuted = !isMuted; document.getElementById('mute-btn').innerHTML = isMuted ? "🔇" : "🔊"; }
    function playTacticalPing() { if (isMuted) return; try { const ctx = new (window.AudioContext)(); const osc = ctx.createOscillator(); const gain = ctx.createGain(); const vol = document.getElementById('volSlider').value; osc.type = 'square'; osc.frequency.setValueAtTime(880, ctx.currentTime); gain.gain.setValueAtTime(vol * 0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e){} }
    function jumpTo(pos) { map.flyTo(pos, 1); }

    async function load() {
        if (isSaving) return;
        try {
            const res = await fetch('/pings');
            const data = await res.json();
            if (data.length > lastCount && lastCount !== 0) playTacticalPing();
            lastCount = data.length;

            const currentIds = data.map(p => p.id.toString());
            Object.keys(renderedMarkers).forEach(id => { if (!currentIds.includes(id)) { map.removeLayer(renderedMarkers[id]); delete renderedMarkers[id]; } });

            data.forEach(p => {
                if (renderedMarkers[p.id]) return;
                const parts = p.label ? p.label.split('|') : [];
                const color = parts[0] || '#00ff41';
                const rot = parts[3] || 0;
                let layer;

                if (p.points_json) {
                    layer = L.polygon(JSON.parse(p.points_json), {color: color, fillOpacity: 0.3});
                } else if (iconFiles[p.type]) {
                    const img = iconFiles[p.type].any || (color === '#ff3e3e' ? iconFiles[p.type].red : iconFiles[p.type].blue);
                    
                    // Création d'un DivIcon personnalisé pour combiner l'icône droite + la flèche de direction
                    const customHtml = `
                        <div class="tactical-marker-container">
                            <div class="dir-arrow" style="transform: rotate(${rot}deg); color: ${color};">▲</div>
                            <img src="${img}" style="width:30px; height:auto; position:relative; z-index:2;">
                        </div>`;
                    
                    layer = L.marker([p.x, p.y], {
                        icon: L.divIcon({ className: '', html: customHtml, iconSize: [40, 40], iconAnchor: [20, 20] })
                    });
                }

                if (layer) {
                    layer.on('click', () => { if(confirm("Supprimer ce marqueur ?")) del(p.id); });
                    layer.addTo(map);
                    renderedMarkers[p.id] = layer;
                }
            });
        } catch (e) {}
    }

    function setType(t, b) { currentType = t; document.querySelectorAll('.icon-btn, .btn-util').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); }
    function setColor(c, el) { currentColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); }
    async function save(obj) { isSaving = true; await fetch('/pings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(obj) }); isSaving = false; load(); }
    async function del(id) { await fetch(`/pings?id=${id}`, { method: 'DELETE' }); load(); }
    async function clearAll() { if(confirm("WIPE TERMINAL?")) { await fetch('/pings?id=all', { method: 'DELETE' }); load(); } }

    map.on('click', e => {
        const pos = [e.latlng.lat, e.latlng.lng];
        if (currentType === 'zone') {
            pointsBuffer.push(pos);
            if (pointsBuffer.length === 3) { save({ type: 'zone', points_json: JSON.stringify(pointsBuffer), label: `${currentColor}|40` }); pointsBuffer = []; }
        } else {
            save({ x: pos[0], y: pos[1], type: currentType, label: `${currentColor}|40||${currentRot}` });
        }
    });

    setInterval(load, 1000);
    load();
</script>
</body>
</html>
