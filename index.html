<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ALTIS COMMAND TERMINAL | RHS UNLOCKED</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff41; --blue: #00d2ff; --red: #ff3e3e; --orange: #ff9d00; --bg: #05070a; }
        #map::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: rgba(0, 255, 65, 0.2); box-shadow: 0 0 15px var(--primary); z-index: 1000; pointer-events: none; animation: scanning 8s linear infinite; }
        @keyframes scanning { 0% { top: 0%; } 100% { top: 100%; } }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; }
        #app { display: flex; height: 100vh; }
        #sidebar { width: 280px; background: linear-gradient(135deg, #10141d 0%, #05070a 100%); border-right: 4px solid #1a222d; border-image: linear-gradient(to bottom, #2a3544, #10141d) 1 100%; padding: 15px; display: flex; flex-direction: column; z-index: 1001; overflow-y: auto; box-shadow: inset -10px 0 20px rgba(0,0,0,0.8); }
        .header { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.1rem; text-align: center; margin-bottom: 15px; letter-spacing: 2px; text-shadow: 0 0 8px var(--primary); animation: glitch 4s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 2% { transform: translate(2px, -1px); text-shadow: 2px 0 var(--red), -2px 0 var(--blue); opacity: 0.8; } 4% { transform: translate(-2px, 1px); text-shadow: -2px 0 var(--red), 2px 0 var(--blue); opacity: 1; } 100% { transform: translate(0); } }
        .section-label { font-size: 0.6rem; color: #555; text-transform: uppercase; margin: 12px 0 6px; font-weight: bold; border-bottom: 1px solid #1a222d; padding-bottom: 3px; }
        .bookmark-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
        .btn-jump { background: #111; border: 1px solid #333; color: #8892b0; font-size: 0.62rem; padding: 6px 2px; cursor: pointer; border-radius: 3px; font-weight: bold; transition: 0.2s; text-align: center; }
        .btn-jump:hover { border-color: var(--blue); color: white; background: rgba(0, 210, 255, 0.1); }
        .mode-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .mode-btn { padding: 10px 2px; border: 1px solid #333; background: #111; color: #666; cursor: pointer; font-size: 0.6rem; font-weight: bold; border-radius: 4px; text-align: center; transition: 0.2s; }
        .mode-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 255, 65, 0.1); box-shadow: 0 0 8px var(--primary); }
        .mode-btn#btn-edit.active { border-color: var(--blue); color: var(--blue); background: rgba(0, 210, 255, 0.1); box-shadow: 0 0 8px var(--blue); }
        .mode-btn.mode-del.active { border-color: var(--red); color: var(--red); background: rgba(255, 62, 62, 0.1); box-shadow: 0 0 8px var(--red); }
        .grid-icons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
        .icon-btn { background: rgba(255,255,255,0.03); border: 1px solid #2a3544; padding: 8px; border-radius: 4px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; }
        .icon-btn img { width: 30px; height: auto; margin-bottom: 5px; filter: drop-shadow(0 0 2px black); }
        .icon-btn span { font-size: 0.55rem; color: #8892b0; text-align: center; font-weight: bold; }
        .icon-btn.active { border-color: var(--blue); background: rgba(0, 210, 255, 0.1); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        .color-dot { height: 25px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 10px white; }
        .audio-panel { margin-top: 10px; padding: 10px; border: 1px solid #1a222d; border-radius: 4px; background: rgba(0,0,0,0.4); box-shadow: inset 0 0 10px black; }
        .mute-btn { background: #111; border: 1px solid #333; cursor: pointer; font-size: 1.1rem; padding: 2px 8px; border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: 0.2s; min-width: 45px; color: white; }
        .mute-btn.active { border-color: var(--red); color: var(--red); }
        #map { flex-grow: 1; background: #000; cursor: crosshair; position: relative; }
        .status-bar { position: absolute; bottom: 15px; right: 15px; background: rgba(13, 17, 23, 0.9); padding: 6px 12px; border: 1px solid var(--primary); font-size: 0.6rem; color: var(--primary); z-index: 1001; text-shadow: 0 0 5px var(--primary); }
        .leaflet-image-layer { image-rendering: crisp-edges; image-rendering: pixelated; filter: brightness(1) contrast(1); }
        .map-label { background: none !important; border: none !important; box-shadow: none !important; color: white; font-weight: bold; text-shadow: 2px 2px 2px black; font-size: 14px; white-space: nowrap; }
        .btn-util { width: 100%; padding: 10px; margin-bottom: 4px; border: 1px solid #2a3544; background: rgba(255,255,255,0.02); color: #8892b0; cursor: pointer; font-size: 0.7rem; border-radius: 4px; text-align: left; }
        .btn-util.active { border-color: white; color: white; background: rgba(255, 255, 255, 0.1); }
        .clear-all { margin-top: auto; color: var(--red); border: 1px solid var(--red); background: transparent; padding: 8px; cursor: pointer; font-size: 0.6rem; opacity: 0.7; }
        
        .tactical-marker { position: relative; display: flex; align-items: center; justify-content: center; overflow: visible !important; }
        .dir-arrow { position: absolute; font-size: 18px; font-weight: bold; z-index: 1; }

        /* HUD ARTILLERIE */
        #artillery-hud { position: absolute; top: 15px; right: 15px; width: 330px; background: rgba(13, 17, 23, 0.95); border: 1px solid var(--orange); border-radius: 4px; padding: 10px; font-family: 'JetBrains Mono', monospace; color: white; z-index: 1002; display: none; box-shadow: 0 0 15px rgba(255, 157, 0, 0.2); }
        #artillery-hud .hud-header { font-family: 'Orbitron', sans-serif; color: var(--orange); text-align: center; font-size: 0.8rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        #artillery-hud .hud-data { font-size: 0.65rem; line-height: 1.5; color: #8892b0; }
        #artillery-hud .hud-data b { color: white; font-size: 0.7rem; }
        #artillery-hud .close-hud { position: absolute; top: 5px; right: 5px; background: none; border: none; color: var(--red); cursor: pointer; font-weight: bold; }
        
        /* HUD PLANIFICATEUR ROUTE */
        #route-hud { position: absolute; top: 15px; left: 310px; width: 250px; background: rgba(13, 17, 23, 0.95); border: 1px solid var(--blue); border-radius: 4px; padding: 10px; font-family: 'JetBrains Mono', monospace; color: white; z-index: 1002; display: none; box-shadow: 0 0 15px rgba(0, 210, 255, 0.2); }
        #route-hud .hud-header { font-family: 'Orbitron', sans-serif; color: var(--blue); text-align: center; font-size: 0.8rem; margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 5px; }
        
        #charge-select, .alt-input, #transport-select { background: rgba(0,0,0,0.5); border: 1px solid var(--orange); padding: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; width: 100%; box-sizing: border-box; outline: none; border-radius: 3px; margin-bottom: 4px;}
        #charge-select, .alt-input { color: var(--orange); }
        #transport-select { color: var(--blue); border-color: var(--blue); margin: 4px 0; }
        #charge-select option, #transport-select option { background: #111; color: white; }
        .alt-input { margin-top: 2px; color: white; }
        .alt-input::placeholder { color: #555; }
        .alt-container { display: flex; gap: 5px; margin-top: 5px; }
        .alt-box { flex: 1; text-align: center; }

        .tooltip-artillery { background: rgba(0, 0, 0, 0.8) !important; border: 1px solid var(--orange) !important; color: white !important; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: bold; box-shadow: 0 0 5px var(--orange); line-height: 1.4; text-align: center; }
        .tooltip-route { background: rgba(0, 0, 0, 0.8) !important; border: 1px solid var(--blue) !important; color: white !important; font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: bold; box-shadow: 0 0 5px var(--blue); line-height: 1.4; text-align: center; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="header">ALTIS</div>
        <div class="section-label">SIGNETS TACTIQUES</div>
        <div class="bookmark-grid">
            <button class="btn-jump" onclick="jumpTo([11100, 3600])">KAVALA</button>
            <button class="btn-jump" onclick="jumpTo([12600, 16800])">PYRGOS</button>
            <button class="btn-jump" onclick="jumpTo([18700, 14000])">ATHIRA</button>
            <button class="btn-jump" onclick="jumpTo([16300, 14500])">AIRPORT</button>
            <button class="btn-jump" onclick="jumpTo([21300, 25600])">SOFIA</button>

        </div>
        <div class="section-label">MODE OPÉRATOIRE</div>
        <div class="mode-selector">
            <button id="btn-add" class="mode-btn active" onclick="setInterMode('ADD')">AJOUTER</button>
            <button id="btn-edit" class="mode-btn" onclick="setInterMode('EDIT')">ÉDITER</button>

        <div class="section-label">UNITÉS & COMBAT</div>
        <div class="grid-icons">

            <button class="icon-btn" onclick="setType('Vehicule', this)"><img src="Icons/Vehicule.png"><span>VHC LÉGER</span></button>
            <button class="icon-btn" onclick="setType('HeavyArmor', this)"><img src="Icons/HeavyArmor.png"><span>BLINDÉ LOURD</span></button>
            <button class="icon-btn" onclick="setType('Attackhelicopter', this)"><img src="Icons/Attackhelicopter.png"><span>HÉLICO ATT.</span></button>
            <button class="icon-btn" onclick="setType('Dead', this)"><img src="Icons/Dead.png"><span>DANGER / MORT</span></button>

        </div>
        <div class="section-label">SUPPORT & MINES</div>
        <div class="grid-icons">
            <button class="icon-btn" onclick="setType('Mine', this)"><img src="Icons/Mine.png"><span>MINE TACT.</span></button>
            <button class="icon-btn" onclick="setType('Artillery', this)"><img src="Icons/Artillery.png"><span>ARTILLERIE</span></button>
            <button class="icon-btn" onclick="setType('Airdefense', this)"><img src="Icons/Airdefense.png"><span>DÉFENSE AIR</span></button>
            <button class="icon-btn" onclick="setType('Armourwheeled', this)"><img src="Icons/Armourwheeled.png"><span>BLINDÉ LÉGER</span></button>
        </div>
        <div class="section-label">DIMENSION</div>
        <input type="range" id="sizeSlider" min="20" max="100" value="40" oninput="updateSizePreview(this.value)">
        <div id="sizeVal" style="font-size:0.6rem; text-align:right">40px</div>
        <div class="section-label">COULEUR TACTIQUE</div>
        <div class="color-picker" style="display:grid; grid-template-columns:repeat(6, 1fr); gap:4px">
            <div class="color-dot active" style="background: var(--primary);" onclick="setColor('#00ff41', this)"></div>
            <div class="color-dot" style="background: var(--blue);" onclick="setColor('#00d2ff', this)"></div>
            <div class="color-dot" style="background: var(--red);" onclick="setColor('#ff3e3e', this)"></div>
            <div class="color-dot" style="background: var(--orange);" onclick="setColor('#ff9d00', this)"></div>
            <div class="color-dot" style="background: #ffffff;" onclick="setColor('#ffffff', this)"></div>
            <div class="color-dot" style="background: #000000; border: 1px solid #333;" onclick="setColor('#000000', this)"></div>
        </div>
        <div class="section-label">OUTILS SPÉCIAUX</div>
        <button class="btn-util" onclick="ouvrirHudManuel()">🧮 CALCUL MANUEL (SANS CARTE)</button>
        <button class="btn-util" style="color:var(--orange); border-color:var(--orange);" onclick="setType('mesure', this)">📏 RÈGLE ARTILLERIE</button>
        <button class="btn-util" style="color:var(--blue); border-color:var(--blue);" onclick="setType('route', this)">🛣️ TRACER ITINÉRAIRE</button>
        <button class="btn-util" onclick="setType('arrow', this)">➔ FLÈCHE (2 CLICS)</button>
        <button class="btn-util" onclick="setType('zone', this)">⬢ ZONE (3 CLICS)</button>
        <button class="btn-util" onclick="setType('zone4', this)">⬢ ZONE (4 CLICS)</button>
        <button class="btn-util" onclick="setType('circle', this)">◯ CERCLE (2 CLICS)</button>
        <button class="btn-util" onclick="setType('text', this)">📝 TEXTE TACTIQUE</button>
        <div class="section-label">AUDIO</div>
        <div class="audio-panel">
            <div class="audio-row" style="display:flex; align-items:center; gap:10px;">
                <button id="mute-btn" class="mute-btn" onclick="toggleMute()">🔊</button>
                <input type="range" id="volSlider" min="0" max="1" step="0.1" value="0.5" style="flex-grow:1">
            </div>
        </div>
        <button class="clear-all" onclick="clearAll()">WIPE TERMINAL</button>
    </div>
    <div id="map"></div>

    <div id="artillery-hud">
        <button class="close-hud" onclick="fermerHud()">X</button>
        <div class="hud-header">RAPPORT BALISTIQUE (DÉVERROUILLÉ)</div>
        
        <div class="hud-data">
            <label style="color:var(--orange); font-weight:bold;">SÉLECTION CHARGE (M252 81mm):</label>
            <select id="charge-select" onchange="updateV0()">
                <option value="42">CHARGE 0 (RHS: 42 m/s)</option>
                <option value="94">CHARGE 1 (RHS: 94 m/s)</option>
                <option value="188" selected>CHARGE 2 (RHS: 188 m/s)</option>
                <option value="425">CHARGE 3 (RHS: 425 m/s)</option>
                <option value="1675">CHARGE 4 (RHS: 1675 m/s)</option>
            </select>
            
            <div class="alt-container" style="background: rgba(255, 157, 0, 0.1); padding: 5px; border-radius: 4px; border: 1px dashed var(--orange); margin-bottom: 5px;">
                <div class="alt-box">
                    <label style="color:var(--blue);">VITESSE (m/s)</label>
                    <input type="number" id="v0-input" class="alt-input" value="188" step="0.01" oninput="majArtillerie()">
                </div>
                <div class="alt-box">
                    <label style="color:var(--red);">COEFF. AIR</label>
                    <input type="number" id="air-friction" class="alt-input" value="-0.00057" step="0.00001" oninput="majArtillerie()">
                </div>
            </div>

            <div class="alt-container">
                <div class="alt-box">
                    <label>ALT. TIREUR</label>
                    <input type="number" id="alt-mortier" class="alt-input" placeholder="Auto" step="1" oninput="majArtillerie()">
                </div>
                <div class="alt-box">
                    <label>ALT. CIBLE</label>
                    <input type="number" id="alt-cible" class="alt-input" placeholder="Auto" step="1" oninput="majArtillerie()">
                </div>
            </div>
            
            <div style="border-top: 1px solid #333; margin: 8px 0;"></div>
            
            <div class="alt-container" style="margin-bottom: 8px;">
                <div class="alt-box" style="flex: 1.5;">
                    <label style="color:var(--primary);">DIST. CIBLE (m)</label>
                    <input type="number" id="dist-input" class="alt-input" placeholder="Ex: 899" step="1" oninput="majArtillerie()">
                </div>
                <div class="alt-box">
                    <label>AZIMUT</label>
                    <div style="margin-top: 4px; font-size: 0.75rem;"><b id="hud-azimut">--</b></div>
                </div>
            </div>
            
            <div style="border-top: 1px solid #333; margin: 6px 0;"></div>
            <p style="color: var(--primary)">ÉLÉV (HAUTE) : <b id="hud-elev-haut">--</b> | VOL: <b id="hud-temps-haut">--</b></p>
            <p style="color: var(--blue)">ÉLÉV (TENDUE) : <b id="hud-elev-bas">--</b> | VOL: <b id="hud-temps-bas">--</b></p>
        </div>
    </div>

    <div id="route-hud">
        <button class="close-hud" onclick="fermerRouteHud()" style="position: absolute; top: 5px; right: 5px; background: none; border: none; color: var(--red); cursor: pointer; font-weight: bold;">X</button>
        <div class="hud-header">PLANIFICATEUR ITINÉRAIRE</div>
        <div style="font-size: 0.7rem; color: #8892b0;">
            <p>DISTANCE TOTALE : <b id="route-dist" style="color: white;">0m</b></p>
            <label style="color:var(--blue); font-weight:bold;">TRANSPORT :</label>
            <select id="transport-select" onchange="majRoute()">
                <option value="5">INFANTERIE (5 km/h)</option>
                <option value="40">BLINDÉ LOURD (40 km/h)</option>
                <option value="60" selected>VHC LÉGER (60 km/h)</option>
                <option value="200">HÉLICOPTÈRE (200 km/h)</option>
            </select>
            <p style="color: var(--primary); margin-top: 8px;">ETA : <b id="route-eta" style="color: white;">--</b></p>
            <button onclick="validerRoute()" style="width: 100%; padding: 5px; margin-top: 5px; background: var(--blue); color: black; border: none; font-weight: bold; cursor: pointer; border-radius: 3px;">SAUVEGARDER</button>
        </div>

    <div class="status-bar" id="status">LIAISON ÉTABLIE</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // INITIALISATION DE LA CARTE HAUTE RÉSOLUTION (Arma3Map)
    const map = L.map('map', {
        crs: L.CRS.Simple,
        minZoom: 0,
        maxZoom: 6,
        zoomControl: false
    });

    const mapSize = 30720;
    const bounds = [[0, 0], [mapSize, mapSize]];

    L.tileLayer('https://jetelain.github.io/Arma3Map/Tiles/altis/topo/{z}/{x}/{y}.png', {
        minZoom: 0,
        maxZoom: 6,
        noWrap: true,
        bounds: bounds,
        tms: false
    }).addTo(map);

    map.fitBounds(bounds);

    // CORRECTION DE L'ÉCHELLE POUR LA NOUVELLE CARTE
    const ECHELLE_PXM = 1.0; 
    
    let artillerieCible = { p1: null, p2: null }; 

    let interMode = 'ADD', currentType = 'Infantry', currentColor = '#00ff41', currentSize = 40;
    let pointsBuffer = [], renderedMarkers = {}, isSaving = false, lastCount = 0, isMuted = false;
    let drawingPolyline; 
    let pendingIconPos = null;
    
    let routePoints = [];
    let routePolyline = null;
    let currentRouteDist = 0;

    const iconFiles = {
        'Infantry': { blue: 'Icons/Infantry.png', red: 'Icons/Infantry2.png' },
        'Vehicule': { blue: 'Icons/Vehicule.png', red: 'Icons/Vehicule2.png' },
        'HeavyArmor': { blue: 'Icons/HeavyArmor.png', red: 'Icons/HeavyArmor2.png' },
        'Armourwheeled': { blue: 'Icons/Armourwheeled.png', red: 'Icons/Armourwheeled2.png' },
        'Artillery': { blue: 'Icons/Artillery.png', red: 'Icons/Artillery2.png' },
        'Airdefense': { blue: 'Icons/Airdefense.png', red: 'Icons/Airdefense2.png' },
        'Attackhelicopter': { blue: 'Icons/Attackhelicopter.png', red: 'Icons/Attackhelicopter2.png' },
        'Mine': { blue: 'Icons/Mine.png', red: 'Icons/Mine2.png' },
        'Dead': { any: 'Icons/Dead.png' },
        'Dot': { isVector: true }
    };

    function updateV0() {
        document.getElementById('v0-input').value = document.getElementById('charge-select').value;
        majArtillerie();
    }

    function ouvrirHudManuel() {
        document.getElementById('artillery-hud').style.display = 'block';
        document.getElementById('hud-azimut').innerText = "--";
        updateStatus("CALCULATEUR MANUEL ACTIF");
        majArtillerie();
    }

    function calculerTirRHS(distCible, v0, altShooter, altTarget) {
        distCible = parseFloat(distCible);
        altShooter = parseFloat(altShooter) || 0;
        altTarget = parseFloat(altTarget) || 0;
        let airFriction = parseFloat(document.getElementById('air-friction').value) || 0;

        if (distCible === 0 || isNaN(distCible)) return null;

        function simulerVol(angleDeg) {
            const dt = 0.02; 
            let x = 0;
            let y = altShooter;
            let vx = v0 * Math.cos(angleDeg * Math.PI / 180);
            let vy = v0 * Math.sin(angleDeg * Math.PI / 180);
            let t = 0;

            while (y >= Math.min(altShooter, altTarget) - 200 && t < 200) {
                let v = Math.sqrt(vx*vx + vy*vy);
                let ax = airFriction * v * vx;
                let ay = airFriction * v * vy - 9.81;

                vx += ax * dt;
                vy += ay * dt;
                
                x += vx * dt;
                y += vy * dt;
                t += dt;

                if (vy < 0 && y <= altTarget) {
                    let y_prev = y - vy * dt;
                    let x_prev = x - vx * dt;
                    let ratio = (altTarget - y) / (y_prev - y);
                    let final_x = x - (x - x_prev) * ratio;
                    return { distance: final_x, temps: t };
                }
            }
            return null; 
        }

        let minHaut = 45; let maxHaut = 89.9; let angleHaut = null; let tempsHaut = null;
        for (let i = 0; i < 30; i++) {
            let testAngle = (minHaut + maxHaut) / 2;
            let sim = simulerVol(testAngle);
            if (!sim) { maxHaut = testAngle; continue; }
            if (sim.distance > distCible) minHaut = testAngle; else maxHaut = testAngle; 
            angleHaut = testAngle; tempsHaut = sim.temps;
        }

        let minBas = 0.1; let maxBas = 45; let angleBas = null; let tempsBas = null;
        for (let i = 0; i < 30; i++) {
            let testAngle = (minBas + maxBas) / 2;
            let sim = simulerVol(testAngle);
            if (!sim) { minBas = testAngle; continue; }
            if (sim.distance > distCible) maxBas = testAngle; else minBas = testAngle; 
            angleBas = testAngle; tempsBas = sim.temps;
        }

        let verifHaut = simulerVol(angleHaut);
        if (!verifHaut || Math.abs(verifHaut.distance - distCible) > 5) angleHaut = null;
        let verifBas = simulerVol(angleBas);
        if (!verifBas || Math.abs(verifBas.distance - distCible) > 5) angleBas = null;

        return {
            haut: angleHaut ? `${angleHaut.toFixed(2)}°` : "HORS PORTÉE",
            tempsHaut: angleHaut ? `${tempsHaut.toFixed(1)}s` : "--",
            bas: angleBas ? `${angleBas.toFixed(2)}°` : "HORS PORTÉE",
            tempsBas: angleBas ? `${tempsBas.toFixed(1)}s` : "--"
        };
    }

    function majArtillerie() {
        let distMeters = parseFloat(document.getElementById('dist-input').value);
        
        if (!distMeters || isNaN(distMeters)) {
            document.getElementById('hud-elev-haut').innerText = "--";
            document.getElementById('hud-temps-haut').innerText = "--";
            document.getElementById('hud-elev-bas').innerText = "--";
            document.getElementById('hud-temps-bas').innerText = "--";
            return;
        }

        const v0 = parseFloat(document.getElementById('v0-input').value);
        let valM = document.getElementById('alt-mortier').value;
        let valC = document.getElementById('alt-cible').value;
        
        let altMortier = valM !== "" ? parseFloat(valM) : 0;
        let altCible = valC !== "" ? parseFloat(valC) : 0;
        
        if (valM === "" && valC !== "") altMortier = altCible;
        if (valC === "" && valM !== "") altCible = altMortier;
        
        const tir = calculerTirRHS(distMeters, v0, altMortier, altCible);
        
        if (tir) {
            document.getElementById('hud-elev-haut').innerText = tir.haut;
            document.getElementById('hud-temps-haut').innerText = tir.tempsHaut;
            document.getElementById('hud-elev-bas').innerText = tir.bas;
            document.getElementById('hud-temps-bas').innerText = tir.tempsBas;
            updateStatus("CALCUL TERMINÉ");
        } else {
            document.getElementById('hud-elev-haut').innerText = "HORS PORTÉE";
            document.getElementById('hud-temps-haut').innerText = "--";
            document.getElementById('hud-elev-bas').innerText = "HORS PORTÉE";
            document.getElementById('hud-temps-bas').innerText = "--";
            updateStatus("CIBLE HORS PORTÉE (TROP LOIN/HAUT)");
        }
    }

    function majRoute() {
        document.getElementById('route-dist').innerText = `${currentRouteDist.toFixed(0)}m`;
        const speedKmh = parseFloat(document.getElementById('transport-select').value);
        const speedMs = speedKmh / 3.6;
        
        if (currentRouteDist === 0) {
            document.getElementById('route-eta').innerText = "0s";
            return;
        }
        
        const timeSec = currentRouteDist / speedMs;
        let etaTxt = "";
        if (timeSec < 60) {
            etaTxt = `${Math.round(timeSec)}s`;
        } else {
            const mins = Math.floor(timeSec / 60);
            const secs = Math.round(timeSec % 60);
            etaTxt = `${mins}m ${secs}s`;
        }
        document.getElementById('route-eta').innerText = etaTxt;
    }

    function validerRoute() {
        if (routePoints.length < 2) return fermerRouteHud();
        
        const distTxt = document.getElementById('route-dist').innerText;
        const etaTxt = document.getElementById('route-eta').innerText;
        const transportInfo = document.getElementById('transport-select').options[document.getElementById('transport-select').selectedIndex].text;
        const transportName = transportInfo.split('(')[0].trim();
        const tooltipText = `ROUTE (${transportName})<br>DIST: ${distTxt} — ETA: ${etaTxt}`;
        
        save({ 
            x: routePoints[0][0], y: routePoints[0][1],
            type: 'mesure_line', 
            points_json: JSON.stringify(routePoints), 
            label: `${currentColor}|${currentSize}|${tooltipText}` 
        });
        
        fermerRouteHud();
    }

    function fermerRouteHud() {
        document.getElementById('route-hud').style.display = 'none';
        routePoints = [];
        currentRouteDist = 0;
        if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; }
        if (drawingPolyline) { map.removeLayer(drawingPolyline); drawingPolyline = null; }
        if(currentType === 'route') updateStatus("LIAISON ÉTABLIE");
    }

    function fermerHud() {
        document.getElementById('artillery-hud').style.display = 'none';
        artillerieCible = { p1: null, p2: null };
        if (currentType === 'mesure') {
            pointsBuffer = [];
            if (drawingPolyline) { map.removeLayer(drawingPolyline); drawingPolyline = null; }
            updateStatus("LIAISON ÉTABLIE");
        }
    }

    function toggleMute() { isMuted = !isMuted; const btn = document.getElementById('mute-btn'); btn.innerHTML = isMuted ? "🔇" : "🔊"; btn.classList.toggle('active', isMuted); }
    function playTacticalPing() { if (isMuted) return; try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); const vol = document.getElementById('volSlider').value; const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = 'square'; osc.frequency.setValueAtTime(880, ctx.currentTime); gain.gain.setValueAtTime(vol * 0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1); osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.1); } catch(e){} }
    function jumpTo(pos) { map.flyTo(pos, 1, { animate: true, duration: 1.2 }); updateStatus(`DÉPLOIEMENT : ZONE ${pos}`); }
    map.on('contextmenu', (e) => { alert("Coordonnées précises : [" + e.latlng.lat.toFixed(0) + ", " + e.latlng.lng.toFixed(0) + "]"); });

    function setInterMode(m) { fermerHud(); fermerRouteHud(); interMode = m; ['btn-add', 'btn-edit', 'btn-del'].forEach(id => document.getElementById(id).classList.remove('active')); document.getElementById(`btn-${m.toLowerCase()}`).classList.add('active'); load(); }
    function setType(t, b) { 
        fermerHud(); 
        fermerRouteHud(); 
        currentType = t; 
        document.querySelectorAll('.icon-btn, .btn-util').forEach(btn => btn.classList.remove('active')); 
        b.classList.add('active'); 
        pointsBuffer = []; 
        pendingIconPos = null; 
        if (drawingPolyline) { map.removeLayer(drawingPolyline); drawingPolyline = null; } 
        if(interMode !== 'ADD' && interMode !== 'EDIT') setInterMode('ADD'); 
        updateStatus(`OUTIL : ${t.toUpperCase()}`); 
    }
    function updateSizePreview(val) { currentSize = val; document.getElementById('sizeVal').innerText = val + "px"; }
    function setColor(c, el) { currentColor = c; document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active')); el.classList.add('active'); if(drawingPolyline) drawingPolyline.setStyle({color: c}); if(routePolyline) routePolyline.setStyle({color: c}); }

    async function load() {
        if (isSaving) return;
        try {
            const res = await fetch('/pings');
            const data = await res.json();
            if (data.length > lastCount && lastCount !== 0) playTacticalPing();
            lastCount = data.length;
            const currentIds = data.map(p => p.id.toString());
            Object.keys(renderedMarkers).forEach(id => { if (!currentIds.includes(id)) { map.removeLayer(renderedMarkers[id]); delete renderedMarkers[id]; } });
            
            data.forEach(p => {
                const id = p.id.toString();
                if (renderedMarkers[id]) return;
                const parts = p.label ? p.label.split('|') : [];
                const color = parts[0] || '#00ff41';
                const size = parseInt(parts[1]) || 40;
                const rot = parts[3]; 

                let layer;
                if (p.type === 'text') { layer = L.marker([p.x, p.y], { icon: L.divIcon({ className: 'map-label', html: `<span style="color:${color}">${parts[2] || 'TEXTE'}</span>` })}); }
                else if (p.type === 'circle') { const pts = JSON.parse(p.points_json); const radius = Math.sqrt(Math.pow(pts[1][0] - pts[0][0], 2) + Math.pow(pts[1][1] - pts[0][1], 2)); layer = L.circle(pts[0], { radius: radius, color: color, fillOpacity: 0.3, bubblingMouseEvents: true }); }
                else if (p.points_json) { 
                    const pts = JSON.parse(p.points_json);
                    if (p.type === 'mesure_line') {
                        const isRoute = parts[2] && parts[2].includes("ROUTE");
                        let line = L.polyline(pts, {color: color, weight: 3, dashArray: '5, 10', bubblingMouseEvents: true});
                        
                        if (!isRoute) {
                            let killRadiusPx = 35 * ECHELLE_PXM;
                            let circle = L.circle(pts[1], {radius: killRadiusPx, color: '#ff3e3e', fillColor: '#ff3e3e', fillOpacity: 0.3, weight: 1, bubblingMouseEvents: true});
                            layer = L.featureGroup([line, circle]);
                        } else {
                            layer = L.featureGroup([line]);
                        }
                        
                        if (parts[2]) {
                            const tipClass = isRoute ? 'tooltip-route' : 'tooltip-artillery';
                            layer.bindTooltip(parts[2], {className: tipClass, sticky: true, direction: 'center'});
                        }
                    } else if (p.type.startsWith('zone')) {
                        layer = L.polygon(pts, {color: color, fillOpacity: 0.3, bubblingMouseEvents: true});
                    } else {
                        layer = L.polyline(pts, {color: color, weight: 4, bubblingMouseEvents: true});
                    }
                }
                else if (p.type === 'Dot') { layer = L.circleMarker([p.x, p.y], { radius: size / 6, color: color, fillColor: color, fillOpacity: 1 }); }
                else if (iconFiles[p.type]) {
                    const img = iconFiles[p.type].any || (color === '#ff3e3e' ? iconFiles[p.type].red : iconFiles[p.type].blue);
                    const arrowHtml = (rot && rot !== "") ? `<div class="dir-arrow" style="transform: rotate(${rot}deg) translateY(-${size/2 + 5}px); color: ${color};">▲</div>` : '';
                    const customHtml = `<div class="tactical-marker">${arrowHtml}<img src="${img}" style="width:${size}px; height:auto; position:relative; z-index:2;"></div>`;
                    layer = L.marker([p.x, p.y], { icon: L.divIcon({ className: '', html: customHtml, iconSize: [size, size], iconAnchor: [size/2, size/2] }) });
                }
                
                if (layer) { 
                    layer.on('click', (e) => { 
                        if (interMode === 'ADD' && (currentType === 'mesure' || currentType === 'route')) {
                            map.fire('click', e);
                        } else if (interMode === 'EDIT' && p.points_json && p.type === 'mesure_line') {
                            L.DomEvent.stopPropagation(e);
                            const pts = JSON.parse(p.points_json);
                            const isRoute = parts[2] && parts[2].includes("ROUTE");
                            
                            if (!isRoute) {
                                artillerieCible.p1 = pts[0];
                                artillerieCible.p2 = pts[1];
                                const distPx = Math.sqrt(Math.pow(pts[1][1]-pts[0][1], 2) + Math.pow(pts[1][0]-pts[0][0], 2));
                                const dM = (distPx / ECHELLE_PXM).toFixed(0);
                                let dx = pts[1][1] - pts[0][1];
                                let dy = pts[1][0] - pts[0][0];
                                let az = (90 - (Math.atan2(dy, dx) * 180 / Math.PI) + 360) % 360;
                                
                                document.getElementById('artillery-hud').style.display = 'block';
                                document.getElementById('dist-input').value = dM;
                                document.getElementById('hud-azimut').innerText = `${az.toFixed(2)}°`;
                                majArtillerie();
                                updateStatus("DONNÉES DE TIR RECHARGÉES");
                            } else {
                                document.getElementById('route-hud').style.display = 'block';
                                routePoints = pts;
                                currentRouteDist = 0;
                                for(let i=1; i<pts.length; i++) {
                                    const prev = pts[i-1];
                                    const pos = pts[i];
                                    const dp = Math.sqrt(Math.pow(pos[1]-prev[1], 2) + Math.pow(pos[0]-prev[0], 2));
                                    currentRouteDist += (dp / ECHELLE_PXM);
                                }
                                majRoute();
                                updateStatus("ITINÉRAIRE RECHARGÉ");
                            }
                        } else if (interMode !== 'ADD') { 
                            L.DomEvent.stopPropagation(e); 
                            if (interMode === 'DEL') del(p.id); 
                            else if (interMode === 'EDIT' && !p.points_json) updateExisting(p.id, p.x, p.y, p.type, parts[2] || '', parts[3] || ''); 
                        } 
                    }); 
                    layer.addTo(map); 
                    renderedMarkers[id] = layer; 
                }
            });
        } catch (e) {}
    }

    map.on('mousemove', e => { 
        if (drawingPolyline) {
            let start;
            if (currentType === 'mesure' && pointsBuffer.length > 0) {
                start = pointsBuffer[0];
                drawingPolyline.setLatLngs([start, e.latlng]);
                
                const distPx = Math.sqrt(Math.pow(e.latlng.lng - start[1], 2) + Math.pow(e.latlng.lat - start[0], 2));
                const distMeters = (distPx / ECHELLE_PXM).toFixed(0);
                
                let dx = e.latlng.lng - start[1];
                let dy = e.latlng.lat - start[0];
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                let azimut = (90 - angle + 360) % 360; 
                
                document.getElementById('dist-input').value = distMeters;
                document.getElementById('hud-azimut').innerText = `${azimut.toFixed(2)}°`;
                majArtillerie();
            }
            else if (currentType === 'route' && routePoints.length > 0) {
                start = routePoints[routePoints.length - 1];
                drawingPolyline.setLatLngs([start, e.latlng]);
                
                const distPx = Math.sqrt(Math.pow(e.latlng.lng - start[1], 2) + Math.pow(e.latlng.lat - start[0], 2));
                const addedDist = (distPx / ECHELLE_PXM);
                const tempTotalDist = currentRouteDist + addedDist;
                
                document.getElementById('route-dist').innerText = `${tempTotalDist.toFixed(0)}m`;
                
                const speedKmh = parseFloat(document.getElementById('transport-select').value);
                const speedMs = speedKmh / 3.6;
                const timeSec = tempTotalDist / speedMs;
                let etaTxt = "";
                if (timeSec < 60) {
                    etaTxt = `${Math.round(timeSec)}s`;
                } else {
                    const mins = Math.floor(timeSec / 60);
                    const secs = Math.round(timeSec % 60);
                    etaTxt = `${mins}m ${secs}s`;
                }
                document.getElementById('route-eta').innerText = etaTxt;
            }
            else if (pendingIconPos) {
                start = pendingIconPos;
                drawingPolyline.setLatLngs([start, e.latlng]);
            }
            else if (pointsBuffer.length > 0) {
                start = pointsBuffer[pointsBuffer.length - 1];
                drawingPolyline.setLatLngs([start, e.latlng]);
            }
        }
    });

    map.on('click', e => {
        if (interMode !== 'ADD') return;
        const pos = [e.latlng.lat, e.latlng.lng];

        if (currentType === 'route') {
            routePoints.push(pos);
            
            if (routePoints.length === 1) {
                document.getElementById('route-hud').style.display = 'block';
                currentRouteDist = 0;
                majRoute();
                updateStatus("TRACÉ EN COURS... CLIQUEZ POUR AJOUTER DES POINTS");
                routePolyline = L.polyline([pos], {color: currentColor, weight: 3, dashArray: '5, 5'}).addTo(map);
                drawingPolyline = L.polyline([pos, pos], {color: currentColor, weight: 2, dashArray: '5, 10', opacity: 0.5}).addTo(map);
            } else {
                const prev = routePoints[routePoints.length - 2];
                const distPx = Math.sqrt(Math.pow(pos[1]-prev[1], 2) + Math.pow(pos[0]-prev[0], 2));
                currentRouteDist += (distPx / ECHELLE_PXM);
                
                routePolyline.setLatLngs(routePoints);
                majRoute();
            }
            return;
        }

        if (currentType === 'mesure') {
            pointsBuffer.push(pos);
            if (pointsBuffer.length === 1) {
                if (drawingPolyline) { map.removeLayer(drawingPolyline); drawingPolyline = null; }
                
                updateStatus("CLIQUEZ SUR LA CIBLE...");
                document.getElementById('artillery-hud').style.display = 'block';
                document.getElementById('dist-input').value = "";
                document.getElementById('hud-azimut').innerText = "--";
                document.getElementById('hud-elev-haut').innerText = "--";
                document.getElementById('hud-temps-haut').innerText = "--";
                document.getElementById('hud-elev-bas').innerText = "--";
                document.getElementById('hud-temps-bas').innerText = "--";
                
                drawingPolyline = L.polyline([pos, pos], {color: '#000000', dashArray: '5, 10'}).addTo(map);
            } else {
                artillerieCible.p1 = pointsBuffer[0]; 
                artillerieCible.p2 = pointsBuffer[1]; 
                
                const p1 = artillerieCible.p1;
                const p2 = artillerieCible.p2;
                const distPixels = Math.sqrt(Math.pow(p2[1]-p1[1], 2) + Math.pow(p2[0]-p1[0], 2));
                const distMeters = (distPixels / ECHELLE_PXM).toFixed(0);
                
                let dx = p2[1] - p1[1];
                let dy = p2[0] - p1[0];
                let angle = Math.atan2(dy, dx) * (180 / Math.PI);
                let azimut = (90 - angle + 360) % 360; 
                
                document.getElementById('dist-input').value = distMeters;
                document.getElementById('hud-azimut').innerText = `${azimut.toFixed(2)}°`;
                
                majArtillerie(); 

                const elevTxt = document.getElementById('hud-elev-haut').innerText;
                const volTxt = document.getElementById('hud-temps-haut').innerText;
                const tooltipText = `DIST: ${distMeters}m — AZ: ${azimut.toFixed(2)}°<br>ÉLÉV: <span style="color:var(--primary)">${elevTxt}</span> — VOL: ${volTxt}`;
                
                save({ 
                    x: artillerieCible.p1[0], y: artillerieCible.p1[1],
                    type: 'mesure_line', 
                    points_json: JSON.stringify([artillerieCible.p1, artillerieCible.p2]), 
                    label: `#000000|40|${tooltipText}` 
                });
                
                pointsBuffer = [];
                if (drawingPolyline) { map.removeLayer(drawingPolyline); drawingPolyline = null; }
            }
            return;
        }

        if (iconFiles[currentType] && currentType !== 'Dot') {
            if (!pendingIconPos) { pendingIconPos = pos; updateStatus("ORIENTEZ L'UNITÉ (CLIC 2)..."); drawingPolyline = L.polyline([pos, e.latlng], {color: currentColor, weight: 2, dashArray: '5, 10', opacity: 0.5}).addTo(map); }
            else {
                const dx = e.latlng.lng - pendingIconPos[1];
                const dy = e.latlng.lat - pendingIconPos[0];
                let angle = Math.atan2(dx, dy) * (180 / Math.PI);
                const dist = Math.sqrt(dx*dx + dy*dy);
                const finalRot = dist < 5 ? "" : Math.round(angle);
                save({ x: pendingIconPos[0], y: pendingIconPos[1], type: currentType, label: `${currentColor}|${currentSize}||${finalRot}` });
                pendingIconPos = null;
                if (drawingPolyline) { map.removeLayer(drawingPolyline); drawingPolyline = null; }
            }
            return;
        }

        if (currentType === 'text') {
            const txt = prompt("Texte :");
            if(txt) save({ x: pos[0], y: pos[1], type: 'text', label: `${currentColor}|${currentSize}|${txt}` });
        } else if (['arrow', 'zone', 'zone4', 'circle'].includes(currentType)) {
            pointsBuffer.push(pos);
            let limit = (currentType === 'zone') ? 3 : (currentType === 'zone4' ? 4 : 2);
            if (pointsBuffer.length === limit) { save({ type: currentType, points_json: JSON.stringify(pointsBuffer), label: `${currentColor}|${currentSize}` }); pointsBuffer = []; if (drawingPolyline) { map.removeLayer(drawingPolyline); drawingPolyline = null; } }
            else { if (!drawingPolyline) drawingPolyline = L.polyline([pos, e.latlng], {color: currentColor, weight: 2, dashArray: '5, 10', opacity: 0.5}).addTo(map); }
        } else { save({ x: pos[0], y: pos[1], type: currentType, label: `${currentColor}|${currentSize}` }); }
    });

    function updateStatus(t) { document.getElementById('status').innerText = t; }
    async function save(obj) { isSaving = true; await fetch('/pings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(obj) }); isSaving = false; load(); }
    async function del(id) { await fetch(`/pings?id=${id}`, { method: 'DELETE' }); load(); }
    async function clearAll() { if(confirm("WIPE?")) { await fetch('/pings?id=all', { method: 'DELETE' }); load(); } }
    
    async function updateExisting(id, x, y, type, oldText, oldRot) {
        updateStatus("ÉDITION...");
        let newLabel = `${currentColor}|${currentSize}`;
        if (type === 'text') {
            const newTxt = prompt("Modifier le texte :", oldText);
            if (newTxt === null) return;
            newLabel += `|${newTxt}`;
        } else {
            newLabel += `||${oldRot}`;
        }
        await fetch(`/pings?id=${id}`, { method: 'DELETE' });
        save({ x: x, y: y, type: type, label: newLabel });
    }

    setInterval(load, 1000);
    load();
</script>
</body>
</html>
