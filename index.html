<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arma 3 Tactical Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; background: #1a1a1a; color: white; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; background: #0b0b0b; }
        .menu-top { position: absolute; top: 10px; left: 50px; z-index: 1000; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div class="menu-top">
        <b>Tactical Map v1.0</b> | Cliquez sur la carte pour placer un point.
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
  const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2 });
const mapImageUrl = 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Altis_map_Arma_3.png/800px-Altis_map_Arma_3.png';
const imageBounds = [[0, 0], [1000, 1000]];
L.imageOverlay(mapImageUrl, imageBounds).addTo(map);
map.fitBounds(imageBounds);

// --- FONCTION : Charger les points depuis Cloudflare ---
async function loadPings() {
    const response = await fetch('/pings');
    const pings = await response.json();
    
    // On nettoie les anciens marqueurs et on affiche les nouveaux
    pings.forEach(p => {
        L.marker([p.x, p.y]).addTo(map)
         .bindPopup(`<b>${p.label}</b><br>Posté le: ${p.timestamp}`);
    });
}

// --- INTERACTION : Envoyer un point au clic ---
map.on('click', async function(e) {
    const { lat, lng } = e.latlng;
    const label = prompt("Nom du point (ex: Ennemi, Loot, Base) :");
    
    if (label) {
        await fetch('/pings', {
            method: 'POST',
            body: JSON.stringify({ x: lat, y: lng, label: label }),
            headers: { 'Content-Type': 'application/json' }
        });
        loadPings(); // Rafraîchir la carte après l'envoi
    }
});

// Charger les points au démarrage
loadPings();

// Optionnel : Rafraîchir automatiquement toutes les 10 secondes
setInterval(loadPings, 10000);
    </script>
</body>
</html>
