<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ALTIS COMMAND TERMINAL | BMS ELITE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff41; --blue: #00d2ff; --red: #ff3e3e; --orange: #ff9d00; --bg: #05070a; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; }
        #app { display: flex; height: 100vh; }
        
        /* ALERTE ROUGE */
        @keyframes danger-pulse { 0% { box-shadow: inset 0 0 0px red; } 50% { box-shadow: inset 0 0 50px red; } 100% { box-shadow: inset 0 0 0px red; } }
        .proximity-alert { animation: danger-pulse 0.5s infinite !important; }

        #sidebar { 
            width: 280px; background: linear-gradient(135deg, #10141d 0%, #05070a 100%); 
            border-right: 4px solid #1a222d; padding: 15px; display: flex; flex-direction: column; z-index: 1001; overflow-y: auto; 
        }

        .header { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.1rem; text-align: center; margin-bottom: 10px; text-shadow: 0 0 8px var(--primary); animation: glitch 4s infinite; }
        @keyframes glitch { 0% { transform: translate(0); } 2% { transform: translate(2px, -1px); opacity: 0.8; } 4% { transform: translate(-2px, 1px); opacity: 1; } 100% { transform: translate(0); } }

        .section-label { font-size: 0.6rem; color: #555; text-transform: uppercase; margin: 12px 0 6px; font-weight: bold; border-bottom: 1px solid #1a222d; }
        
        /* SIGNETS / QUICK JUMP */
        .bookmark-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 10px; }
        .btn-bookmark { background: #111; border: 1px solid #333; color: #8892b0; font-size: 0.6rem; padding: 5px; cursor: pointer; border-radius: 3px; text-align: center; }
        .btn-bookmark:hover { border-color: var(--blue); color: white; }

        .grid-icons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .icon-btn { background: rgba(255,255,255,0.03); border: 1px solid #2a3544; padding: 8px; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .icon-btn.active { border-color: var(--blue); background: rgba(0, 210, 255, 0.1); }
        .icon-btn img { width: 30px; height: auto; margin-bottom: 5px; }
        .icon-btn span { font-size: 0.55rem; color: #8892b0; font-weight: bold; }

        .color-dot { height: 25px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: white; transform: scale(1.1); }

        #map { flex-grow: 1; background: #000; cursor: crosshair; position: relative; }
        
        /* BOUSSOLE & COORDONNÉES */
        .coords-box { position: absolute; bottom: 15px; left: 15px; background: rgba(0,0,0,0.8); border: 1px solid var(--blue); padding: 5px 10px; font-size: 0.7rem; color: var(--blue); z-index: 1001; pointer-events: none; }
        
        .status-bar { position: absolute; bottom: 15px; right: 15px; background: rgba(13, 17, 23, 0.9); padding: 6px 12px; border: 1px solid var(--primary); font-size: 0.6rem; color: var(--primary); z-index: 1001; }

        /* MINIMAP */
        .leaflet-control-minimap { border: 2px solid #1a222d; box-shadow: 0 0 10px black; }
        
        .timestamp-label { font-size: 0.55rem; opacity: 0.8; display: block; margin-top: 2px; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="header">ALTIS COM</div>
        
        <div class="section-label">DÉPLOIEMENT RAPIDE</div>
        <div class="bookmark-grid">
            <button class="btn-bookmark" onclick="jumpTo([1040, 615])">KAVALA</button>
            <button class="btn-bookmark" onclick="jumpTo([850, 1450])">PYRGOS</button>
            <button class="btn-bookmark" onclick="jumpTo([1180, 1150])">AÉROPORT</button>
            <button class="btn-bookmark" onclick="jumpTo([450, 1550])">SOPHIA</button>
        </div>

        <div class="section-label">UNITÉS</div>
        <div class="grid-icons">
            <button class="icon-btn active" onclick="setType('Infantry', this)"><img src="Icons/Infantry.png"><span>INFANTERIE</span></button>
            <button class="icon-btn" onclick="setType('Vehicule', this)"><img src="Icons/Vehicule.png"><span>VHC LÉGER</span></button>
            <button class="icon-btn" onclick="setType('HeavyArmor', this)"><img src="Icons/HeavyArmor.png"><span>BLINDÉ</span></button>
            <button class="icon-btn" onclick="setType('Attackhelicopter', this)"><img src="Icons/Attackhelicopter.png"><span>HÉLICO</span></button>
            <button class="icon-btn" onclick="setType('Dead', this)"><img src="Icons/Dead.png"><span>KIA</span></button>
            <button class="icon-btn" onclick="setType('Dot', this)"><div style="width:10px;height:10px;background:white;border-radius:50%;margin:10px;"></div><span>POINT</span></button>
        </div>

        <div class="section-label">COULEUR TACTIQUE</div>
        <div class="color-picker" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:4px;">
            <div class="color-dot active" style="background: var(--primary);" onclick="setColor('#00ff41', this)"></div>
            <div class="color-dot" style="background: var(--blue);" onclick="setColor('#00d2ff', this)"></div>
            <div class="color-dot" style="background: var(--red);" onclick="setColor('#ff3e3e', this)"></div>
            <div class="color-dot" style="background: var(--orange);" onclick="setColor('#ff9d00', this)"></div>
            <div class="color-dot" style="background: #ffffff;" onclick="setColor('#ffffff', this)"></div>
        </div>

        <div class="section-label">OUTILS</div>
        <button class="btn-util" onclick="setType('arrow', this)">➔ FLÈCHE</button>
        <button class="btn-util" onclick="setType('zone', this)">⬢ ZONE</button>
        <button class="btn-util" onclick="setType('text', this)">📝 TEXTE</button>

        <button class="clear-all" style="margin-top:auto" onclick="clearAll()">WIPE TERMINAL</button>
    </div>
    
    <div id="map">
        <div class="coords-box" id="coords-display">GRID: 000-000 | HDG: 0°</div>
    </div>
    <div class="status-bar" id="status">LIAISON ÉTABLIE</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet-minimap/3.6.1/Control.MiniMap.min.css" />

<script>
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 3, zoomControl: false });
    const bounds = [[0, 0], [1512, 2048]];
    const mainImg = L.imageOverlay('altis.webp', bounds).addTo(map);
    map.fitBounds(bounds);

    // --- INITIALISATION MINIMAP ---
    const miniLayer = L.imageOverlay('altis.webp', bounds);
    new L.Control.MiniMap(miniLayer, { toggleDisplay: true, minimized: false, position: 'bottomright', width: 150, height: 110 }).addTo(map);

    let interMode = 'ADD', currentType = 'Infantry', currentColor = '#00ff41', currentSize = 40;
    let pointsBuffer = [], renderedMarkers = {}, isSaving = false, lastCount = 0;

    const iconFiles = {
        'Infantry': { blue: 'Icons/Infantry.png', red: 'Icons/Infantry2.png' },
        'Vehicule': { blue: 'Icons/Vehicule.png', red: 'Icons/Vehicule2.png' },
        'HeavyArmor': { blue: 'Icons/HeavyArmor.png', red: 'Icons/HeavyArmor2.png' },
        'Attackhelicopter': { blue: 'Icons/Attackhelicopter.png', red: 'Icons/Attackhelicopter2.png' },
        'Dead': { any: 'Icons/Dead.png' }
    };

    function jumpTo(pos) { map.flyTo(pos, 1, { duration: 1.5 }); }

    // --- BOUSSOLE & COORDONNÉES ---
    map.on('mousemove', e => {
        const x = Math.round(e.latlng.lng);
        const y = Math.round(e.latlng.lat);
        document.getElementById('coords-display').innerText = `GRID: ${x.toString().padStart(3,'0')}-${y.toString().padStart(3,'0')} | AZM: ${Math.round(Math.random()*360)}°`;
    });

    // --- HORODATAGE (Time Ago) ---
    function getTimeAgo(dateStr) {
        if(!dateStr) return "";
        const seconds = Math.floor((new Date() - new Date(dateStr)) / 1000);
        if (seconds < 60) return "Just now";
        const mins = Math.floor(seconds / 60);
        return `${mins}m ago`;
    }

    async function load() {
        if (isSaving) return;
        try {
            const res = await fetch('/pings');
            const data = await res.json();
            
            let alertActive = false;
            const enemies = data.filter(p => p.label.includes('#ff3e3e'));
            const allies = data.filter(p => p.label.includes('#00ff41') || p.label.includes('#00d2ff'));

            // --- ALERTE DE PROXIMITÉ ---
            enemies.forEach(en => {
                allies.forEach(al => {
                    const dist = Math.sqrt(Math.pow(en.x - al.x, 2) + Math.pow(en.y - al.y, 2));
                    if(dist < 80) alertActive = true; 
                });
            });
            document.getElementById('map').classList.toggle('proximity-alert', alertActive);

            const currentIds = data.map(p => p.id.toString());
            Object.keys(renderedMarkers).forEach(id => {
                if (!currentIds.includes(id)) { map.removeLayer(renderedMarkers[id]); delete renderedMarkers[id]; }
            });

            data.forEach(p => {
                const id = p.id.toString();
                const timeStr = getTimeAgo(p.created_at); // Utilise la colonne de ta DB

                if (renderedMarkers[id]) {
                    // Update timestamp label si c'est un marqueur texte/div
                    return;
                }

                const parts = p.label ? p.label.split('|') : [];
                const color = parts[0] || '#00ff41';
                let layer;

                const labelHtml = `<span style="color:${color}">${parts[2] || ''}</span><br><span class="timestamp-label">${timeStr}</span>`;

                if (p.type === 'text') {
                    layer = L.marker([p.x, p.y], { icon: L.divIcon({ className: 'map-label', html: labelHtml })});
                } else if (p.points_json) {
                    const pts = JSON.parse(p.points_json);
                    layer = (p.type === 'zone') ? L.polygon(pts, {color: color, fillOpacity: 0.3}) : L.polyline(pts, {color: color, weight: 4});
                } else if (iconFiles[p.type]) {
                    const img = iconFiles[p.type].any || (color === '#ff3e3e' ? iconFiles[p.type].red : iconFiles[p.type].blue);
                    layer = L.marker([p.x, p.y], { icon: L.icon({ iconUrl: img, iconSize: [40, 30] }) });
                    layer.bindTooltip(timeStr, { permanent: true, direction: 'bottom', className: 'timestamp-label' });
                }

                if (layer) {
                    layer.addTo(map);
                    renderedMarkers[id] = layer;
                }
            });
        } catch (e) {}
    }

    // (Reste des fonctions save, del, clearAll identiques...)
    function setType(t, b) {
        currentType = t;
        document.querySelectorAll('.icon-btn, .btn-util').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        updateStatus(`OUTIL : ${t.toUpperCase()}`);
    }
    function setColor(c, el) {
        currentColor = c;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }
    async function save(obj) { isSaving = true; await fetch('/pings', { method: 'POST', body: JSON.stringify(obj) }); isSaving = false; load(); }
    async function clearAll() { if(confirm("WIPE?")) { await fetch('/pings?id=all', { method: 'DELETE' }); load(); } }

    map.on('click', e => {
        if (interMode !== 'ADD') return;
        const pos = [e.latlng.lat, e.latlng.lng];
        if (currentType === 'text') {
            const txt = prompt("Texte :");
            if(txt) save({ x: pos[0], y: pos[1], type: 'text', label: `${currentColor}|40|${txt}` });
        } else if (currentType === 'zone' || currentType === 'arrow') {
            pointsBuffer.push(pos);
            if (pointsBuffer.length >= (currentType === 'arrow' ? 2 : 3)) {
                save({ type: currentType, points_json: JSON.stringify(pointsBuffer), label: `${currentColor}|40` });
                pointsBuffer = [];
            }
        } else {
            save({ x: pos[0], y: pos[1], type: currentType, label: `${currentColor}|40` });
        }
    });

    setInterval(load, 1000);
    load();
</script>
</body>
</html>
