<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL HQ | Altis</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ff41;
            --primary-dim: rgba(0, 255, 65, 0.15);
            --danger: #ff3e3e;
            --bg-dark: #080a0c;
            --sidebar-bg: rgba(13, 17, 23, 0.98);
            --accent: #1f2937;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-dark); font-family: 'Roboto Mono', monospace; color: #e0e0e0; overflow: hidden; }

        #app-container { display: flex; height: 100vh; width: 100vw; }
        
        #map { flex-grow: 1; background: #000; cursor: crosshair; position: relative; }

        /* Effet radar / Vignette sur la carte */
        #map::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8); pointer-events: none; z-index: 1000;
        }

        #sidebar {
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid var(--primary-dim);
            display: flex; flex-direction: column; padding: 25px; box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 1001;
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--primary); margin-bottom: 30px; letter-spacing: 2px; border-bottom: 1px solid var(--primary-dim); padding-bottom: 15px; text-align: center; text-shadow: 0 0 10px var(--primary-dim); }

        .section-title { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 2px; font-weight: bold; }

        .grid-types { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 30px; }
        
        .type-card {
            background: rgba(255,255,255,0.03); border: 1px solid #333; padding: 15px; border-radius: 4px;
            text-align: center; cursor: pointer; transition: all 0.2s ease; font-size: 0.75rem; color: #888;
        }
        .type-card img { width: 28px; display: block; margin: 0 auto 10px; filter: invert(1); opacity: 0.4; transition: 0.2s; }
        .type-card:hover { border-color: var(--primary); color: #fff; }
        .type-card.active { border-color: var(--primary); background: var(--primary-dim); color: var(--primary); box-shadow: inset 0 0 10px var(--primary-dim); }
        .type-card.active img { opacity: 1; filter: invert(1) drop-shadow(0 0 5px var(--primary)); }

        .btn-action {
            width: 100%; padding: 12px; border-radius: 4px; border: none; font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem; cursor: pointer; transition: 0.3s; margin-top: auto; letter-spacing: 1px;
        }
        .btn-clear { background: transparent; border: 1px solid var(--danger); color: var(--danger); opacity: 0.7; }
        .btn-clear:hover { background: var(--danger); color: white; opacity: 1; }

        /* Popups */
        .leaflet-popup-content-wrapper { background: var(--sidebar-bg); color: white; border: 1px solid var(--primary); border-radius: 2px; }
        .leaflet-popup-tip { background: var(--primary); }
        .delete-single-btn { background: var(--danger); color: white; border: none; padding: 6px; width: 100%; cursor: pointer; margin-top: 10px; font-size: 10px; font-weight: bold; font-family: 'Roboto Mono'; }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--primary); color: black; padding: 8px 24px; border-radius: 4px;
            font-weight: bold; font-size: 0.7rem; opacity: 0; transition: 0.4s; z-index: 2000; pointer-events: none;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
        <div class="logo">ALTIS // HQ</div>
        
        <div class="section-title">Unités de déploiement</div>
        <div class="grid-types">
            <div class="type-card active" onclick="setType('infantry', this)">
                <img src="https://cdn-icons-png.flaticon.com/512/711/711769.png"> INFANTRY
            </div>
            <div class="type-card" onclick="setType('vehicle', this)">
                <img src="https://cdn-icons-png.flaticon.com/512/2083/2083320.png"> VEHICLE
            </div>
            <div class="type-card" onclick="setType('enemy', this)">
                <img src="https://cdn-icons-png.flaticon.com/512/822/822143.png"> ENEMY
            </div>
            <div class="type-card" onclick="setType('objective', this)">
                <img src="https://cdn-icons-png.flaticon.com/512/3551/3551525.png"> OBJECTIVE
            </div>
        </div>

        <div class="section-title">Système</div>
        <button class="btn-action btn-clear" onclick="clearAllPings()">WIPE ALL DATA</button>
    </div>

    <div id="map"></div>
</div>

<div id="toast">TRANSMISSION REÇUE</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const imgW = 2048;
    const imgH = 1512;
    let currentType = 'infantry';

    const iconUrls = {
        infantry: 'https://cdn-icons-png.flaticon.com/512/711/711769.png',
        vehicle: 'https://cdn-icons-png.flaticon.com/512/2083/2083320.png',
        enemy: 'https://cdn-icons-png.flaticon.com/512/822/822143.png',
        objective: 'https://cdn-icons-png.flaticon.com/512/3551/3551525.png'
    };

    const map = L.map('map', { 
        crs: L.CRS.Simple, 
        minZoom: -2, 
        maxZoom: 2,
        zoomControl: false,
        attributionControl: false 
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const imageBounds = [[0, 0], [imgH, imgW]];
    // --- CHANGEMENT ICI : altis.webp ---
    const mapImg = L.imageOverlay('altis.webp', imageBounds).addTo(map);
    map.fitBounds(imageBounds);

    function showToast(text) {
        const t = document.getElementById('toast');
        t.innerText = text; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 3000);
    }

    function setType(type, el) {
        currentType = type;
        document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    }

    const getIcon = (type) => L.icon({
        iconUrl: iconUrls[type],
        iconSize: [32, 32],
        iconAnchor: [16, 16],
        popupAnchor: [0, -10]
    });

    async function loadPings() {
        try {
            const res = await fetch('/pings');
            const pings = await res.json();
            
            map.eachLayer((layer) => { 
                if (layer instanceof L.Marker) map.removeLayer(layer); 
            });

            pings.forEach(p => {
                const marker = L.marker([p.x, p.y], { icon: getIcon(p.type) }).addTo(map);
                marker.bindPopup(`
                    <div style="min-width:140px; text-align:center;">
                        <span style="color:var(--primary); font-size:10px; font-weight:bold;">// ${p.type.toUpperCase()}</span>
                        <p style="margin:8px 0; font-size:12px; color:white;">${p.label}</p>
                        <button onclick="deletePing(${p.id})" class="delete-single-btn">TERMINATE</button>
                    </div>
                `);
            });
        } catch(e) { console.error("Sync error"); }
    }

    map.on('click', async function(e) {
        const label = prompt("IDENTIFICATION DU CONTACT :");
        if (!label) return;

        await fetch('/pings', {
            method: 'POST',
            body: JSON.stringify({ x: e.latlng.lat, y: e.latlng.lng, label: label, type: currentType }),
            headers: { 'Content-Type': 'application/json' }
        });
        showToast("SIGNAL LOCALISÉ");
        loadPings();
    });

    async function deletePing(id) {
        await fetch(`/pings?id=${id}`, { method: 'DELETE' });
        showToast("CIBLE ÉLIMINÉE");
        loadPings();
    }

    async function clearAllPings() {
        if(confirm("ATTENTION : EFFACER TOUTES LES DONNÉES TACTIQUES ?")) {
            await fetch('/pings?id=all', { method: 'DELETE' });
            showToast("CARTE RÉINITIALISÉE");
            loadPings();
        }
    }

    setInterval(loadPings, 5000);
    loadPings();
</script>
</body>
</html>
