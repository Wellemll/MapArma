<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TACTICAL HQ | Altis</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ff41;
            --danger: #ff3e3e;
            --sidebar-bg: rgba(13, 17, 23, 0.98);
        }

        body, html { margin: 0; padding: 0; height: 100%; background: #080a0c; font-family: 'Roboto Mono', monospace; color: #e0e0e0; overflow: hidden; }
        #app-container { display: flex; height: 100vh; width: 100vw; }
        #map { flex-grow: 1; background: #000; cursor: crosshair; }

        #sidebar {
            width: 280px; background: var(--sidebar-bg); border-right: 1px solid rgba(0, 255, 65, 0.2);
            display: flex; flex-direction: column; padding: 20px; z-index: 1001;
        }

        .logo { font-family: 'Orbitron', sans-serif; color: var(--primary); text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(0, 255, 65, 0.2); padding-bottom: 10px; }
        .section-title { font-size: 0.7rem; color: #888; text-transform: uppercase; margin: 15px 0 10px; }

        .grid-types { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .type-card {
            background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 10px; border-radius: 4px;
            text-align: center; cursor: pointer; font-size: 0.7rem; transition: 0.2s;
        }
        .type-card:hover { border-color: var(--primary); }
        .type-card.active { border-color: var(--primary); background: rgba(0, 255, 65, 0.1); color: var(--primary); }
        .type-card img { width: 20px; display: block; margin: 0 auto 5px; filter: invert(1); }

        .btn-clear { margin-top: auto; padding: 10px; background: transparent; border: 1px solid var(--danger); color: var(--danger); cursor: pointer; font-family: 'Orbitron'; }
        .btn-clear:hover { background: var(--danger); color: white; }

        #draw-instruction {
            position: absolute; bottom: 20px; left: 300px; background: rgba(0,0,0,0.8);
            color: var(--primary); padding: 10px; border: 1px solid var(--primary); z-index: 1000; display: none;
        }
    </style>
</head>
<body>

<div id="app-container">
    <div id="sidebar">
        <div class="logo">ALTIS // HQ</div>
        
        <div class="section-title">Unités</div>
        <div class="grid-types">
            <div class="type-card active" onclick="setType('infantry', this)"><img src="https://cdn-icons-png.flaticon.com/512/711/711769.png">INF</div>
            <div class="type-card" onclick="setType('vehicle', this)"><img src="https://cdn-icons-png.flaticon.com/512/2083/2083320.png">VHC</div>
            <div class="type-card" onclick="setType('enemy', this)"><img src="https://cdn-icons-png.flaticon.com/512/822/822143.png">ENY</div>
        </div>

        <div class="section-title">Tactique</div>
        <div class="grid-types">
            <div class="type-card" onclick="setType('mine', this)">✹ MINE</div>
            <div class="type-card" onclick="setType('danger', this)">⚠ DANGER</div>
            <div class="type-card" onclick="setType('arrow', this)">➔ FLÈCHE</div>
            <div class="type-card" onclick="setType('zone', this)">⬢ ZONE</div>
        </div>

        <button class="btn-clear" onclick="clearAll()">WIPE DATA</button>
    </div>
    <div id="map"></div>
</div>

<div id="draw-instruction">Cliquez pour tracer. Double-cliquez pour terminer.</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-polylinedecorator/1.6.0/leaflet.polylinedecorator.min.js"></script>

<script>
    const imgW = 2048, imgH = 1512;
    let currentType = 'infantry', isDrawing = false, drawPoints = [], tempLayer = null;

    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 2, zoomControl: false });
    const imageBounds = [[0, 0], [imgH, imgW]];
    L.imageOverlay('altis.webp', imageBounds).addTo(map);
    map.fitBounds(imageBounds);

    function setType(type, el) {
        currentType = type;
        document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        isDrawing = false; drawPoints = [];
        document.getElementById('draw-instruction').style.display = (type === 'arrow' || type === 'zone') ? 'block' : 'none';
    }

    async function loadPings() {
        const res = await fetch('/pings');
        const data = await res.json();
        map.eachLayer(l => { if (l instanceof L.Marker || l instanceof L.Polyline || l instanceof L.Polygon || l instanceof L.PolylineDecorator) if(l.options.alt !== 'map') map.removeLayer(l); });

        data.forEach(p => {
            let layer;
            const content = `<button onclick="deletePing(${p.id})" style="background:red;color:white;border:none;width:100%;cursor:pointer">EFFACER</button>`;
            
            if (p.points_json) {
                const pts = JSON.parse(p.points_json);
                if (p.type === 'zone') layer = L.polygon(pts, {color: '#00ff41'}).addTo(map);
                else {
                    layer = L.polyline(pts, {color: '#00ff41'}).addTo(map);
                    L.polylineDecorator(layer, {patterns: [{offset: '100%', repeat: 0, symbol: L.Symbol.arrowHead({pixelSize: 15, pathOptions: {color: '#00ff41'}})}]}).addTo(map);
                }
            } else {
                layer = L.marker([p.x, p.y]).addTo(map);
            }
            if(layer) layer.bindPopup(content);
        });
    }

    map.on('click', e => {
        if (currentType === 'arrow' || currentType === 'zone') {
            isDrawing = true;
            drawPoints.push([e.latlng.lat, e.latlng.lng]);
            if (tempLayer) map.removeLayer(tempLayer);
            tempLayer = (currentType === 'arrow') ? L.polyline(drawPoints, {color: '#00ff41'}).addTo(map) : L.polygon(drawPoints, {color: '#00ff41'}).addTo(map);
        } else {
            const label = prompt("Nom :");
            savePing({ x: e.latlng.lat, y: e.latlng.lng, type: currentType, label: label });
        }
    });

    map.on('dblclick', () => {
        if (isDrawing) {
            savePing({ type: currentType, points_json: JSON.stringify(drawPoints) });
            isDrawing = false; drawPoints = []; if(tempLayer) map.removeLayer(tempLayer);
        }
    });

    async function savePing(obj) {
        await fetch('/pings', { method: 'POST', body: JSON.stringify(obj) });
        loadPings();
    }

    async function deletePing(id) {
        await fetch(`/pings?id=${id}`, { method: 'DELETE' });
        loadPings();
    }

    async function clearAll() {
        if(confirm("Tout effacer ?")) { await fetch('/pings?id=all', { method: 'DELETE' }); loadPings(); }
    }

    loadPings();
    setInterval(loadPings, 5000);
</script>
</body>
</html>
