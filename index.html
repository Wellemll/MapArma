<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ALTIS TACTICAL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        #app { display: flex; height: 100vh; }
        #sidebar { width: 220px; background: #111; padding: 15px; border-right: 2px solid #333; }
        #map { flex-grow: 1; }
        .btn { width: 100%; padding: 12px; margin-bottom: 5px; cursor: pointer; border: 1px solid #444; background: #222; color: white; font-weight: bold; text-align: left; }
        .btn.active { background: #00ff41; color: black; }
        .clear { background: #ff3e3e; margin-top: 20px; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <h3>UNITÉS</h3>
        <button class="btn active" onclick="setType('inf_blue', this)">👤 ALLIÉ (BLEU)</button>
        <button class="btn" onclick="setType('inf_red', this)">👤 ENNEMI (ROUGE)</button>
        <button class="btn" onclick="setType('arrow', this)">➔ FLÈCHE (2 CLICS)</button>
        <button class="btn clear" onclick="clearAll()">TOUT EFFACER</button>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, zoomControl: false });
    const bounds = [[0, 0], [1512, 2048]];
    L.imageOverlay('altis.webp', bounds).addTo(map);
    map.fitBounds(bounds);

    let currentType = 'inf_blue';
    let firstPoint = null; // Pour le système de flèche en 2 clics

    function setType(t, b) {
        currentType = t;
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        firstPoint = null; 
    }

    async function load() {
        const res = await fetch('/pings');
        const data = await res.json();
        map.eachLayer(l => { if (l instanceof L.Marker || l instanceof L.Polyline) if(!l._url) map.removeLayer(l); });

        data.forEach(p => {
            const color = p.type.includes('blue') ? '#00d2ff' : '#ff3e3e';
            if (p.points_json) {
                const pts = JSON.parse(p.points_json);
                L.polyline(pts, {color: '#00ff41', weight: 5}).addTo(map).bindPopup(`<button onclick="del(${p.id})">Supprimer</button>`);
            } else {
                L.circleMarker([p.x, p.y], {color: color, radius: 8, fillOpacity: 0.8}).addTo(map).bindPopup(`<button onclick="del(${p.id})">Supprimer</button>`);
            }
        });
    }

    map.on('click', e => {
        const pos = [e.latlng.lat, e.latlng.lng];
        
        if (currentType === 'arrow') {
            if (!firstPoint) {
                firstPoint = pos;
                L.circleMarker(pos, {radius: 3, color: 'white'}).addTo(map);
            } else {
                save({ type: 'arrow', points_json: JSON.stringify([firstPoint, pos]) });
                firstPoint = null;
            }
        } else {
            save({ x: pos[0], y: pos[1], type: currentType });
        }
    });

    async function save(obj) {
        await fetch('/pings', { method: 'POST', body: JSON.stringify(obj) });
        load();
    }

    async function del(id) {
        await fetch(`/pings?id=${id}`, { method: 'DELETE' });
        load();
    }

    async function clearAll() {
        if(confirm("Effacer la carte ?")) { await fetch('/pings?id=all', { method: 'DELETE' }); load(); }
    }

    load();
    setInterval(load, 4000);
</script>
</body>
</html>
