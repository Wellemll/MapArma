<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ALTIS COMMAND TERMINAL | HIGH-SPEED</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ff41; --blue: #00d2ff; --red: #ff3e3e; --orange: #ff9d00; --bg: #05070a; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; }
        #app { display: flex; height: 100vh; }
        #sidebar { width: 280px; background: rgba(13, 17, 23, 0.98); border-right: 1px solid #1a222d; padding: 15px; display: flex; flex-direction: column; z-index: 1001; overflow-y: auto; }
        .header { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.1rem; text-align: center; margin-bottom: 15px; letter-spacing: 2px; }
        .section-label { font-size: 0.6rem; color: #555; text-transform: uppercase; margin: 12px 0 6px; font-weight: bold; border-bottom: 1px solid #1a222d; }
        .mode-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .mode-btn { padding: 10px 2px; border: 1px solid #333; background: #111; color: #666; cursor: pointer; font-size: 0.6rem; font-weight: bold; border-radius: 4px; }
        .mode-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 255, 65, 0.1); }
        .grid-icons { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .icon-btn { background: rgba(255,255,255,0.03); border: 1px solid #2a3544; padding: 8px; border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; transition: 0.1s; }
        .icon-btn.active { border-color: var(--blue); background: rgba(0, 210, 255, 0.1); }
        .icon-btn img { width: 30px; height: auto; margin-bottom: 5px; }
        .icon-btn span { font-size: 0.55rem; color: #8892b0; }
        .color-picker { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .color-dot { height: 25px; border-radius: 3px; cursor: pointer; border: 2px solid transparent; }
        .color-dot.active { border-color: white; transform: scale(1.1); }
        #map { flex-grow: 1; background: #000; cursor: crosshair; }
        .status-bar { position: absolute; bottom: 15px; right: 15px; background: rgba(13, 17, 23, 0.9); padding: 6px 12px; border: 1px solid var(--primary); font-size: 0.6rem; color: var(--primary); z-index: 1001; }
        .btn-util { width: 100%; padding: 8px; margin-bottom: 4px; border: 1px solid #2a3544; background: rgba(255,255,255,0.02); color: #8892b0; cursor: pointer; font-size: 0.7rem; text-align: left; }
        .btn-util.active { border-color: white; color: white; }
        .clear-all { margin-top: auto; color: var(--red); border: 1px solid var(--red); background: transparent; padding: 8px; cursor: pointer; font-size: 0.6rem; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="header">ALTIS COM</div>
        
        <div class="section-label">MODE</div>
        <div class="mode-selector">
            <button id="btn-add" class="mode-btn active" onclick="setInterMode('ADD')">AJOUTER</button>
            <button id="btn-edit" class="mode-btn" onclick="setInterMode('EDIT')">ÉDITER</button>
            <button id="btn-del" class="mode-btn" onclick="setInterMode('DEL')">SUPPR</button>
        </div>

        <div class="section-label">UNITÉS</div>
        <div class="grid-icons" id="unit-grid">
            <button class="icon-btn active" onclick="setType('Infantry', this)"><img src="Icons/Infantry.png"><span>INFANTERIE</span></button>
            <button class="icon-btn" onclick="setType('Vehicule', this)"><img src="Icons/Vehicule.png"><span>VHC LÉGER</span></button>
            <button class="icon-btn" onclick="setType('HeavyArmor', this)"><img src="Icons/HeavyArmor.png"><span>BLINDÉ</span></button>
            <button class="icon-btn" onclick="setType('Attackhelicopter', this)"><img src="Icons/Attackhelicopter.png"><span>HÉLICO</span></button>
            <button class="icon-btn" onclick="setType('Dead', this)"><img src="Icons/Dead.png"><span>KIA</span></button>
            <button class="icon-btn" onclick="setType('Dot', this)"><div style="width:10px;height:10px;background:white;border-radius:50%;margin:10px;"></div><span>POINT</span></button>
        </div>

        <div class="section-label">COULEUR</div>
        <div class="color-picker">
            <div class="color-dot active" style="background: var(--primary);" onclick="setColor('#00ff41', this)"></div>
            <div class="color-dot" style="background: var(--blue);" onclick="setColor('#00d2ff', this)"></div>
            <div class="color-dot" style="background: var(--red);" onclick="setColor('#ff3e3e', this)"></div>
            <div class="color-dot" style="background: var(--orange);" onclick="setColor('#ff9d00', this)"></div>
            <div class="color-dot" style="background: #ffffff;" onclick="setColor('#ffffff', this)"></div>
        </div>

        <div class="section-label">OUTILS</div>
        <button class="btn-util" onclick="setType('arrow', this)">➔ FLÈCHE (2 CLICS)</button>
        <button class="btn-util" onclick="setType('zone', this)">⬢ ZONE (3+ CLICS)</button>
        <button class="btn-util" onclick="setType('text', this)">📝 TEXTE</button>

        <button class="clear-all" onclick="clearAll()">WIPE TERMINAL</button>
    </div>
    <div id="map"></div>
    <div class="status-bar" id="status">LIAISON ÉTABLIE</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 3, zoomControl: false });
    const bounds = [[0, 0], [1512, 2048]];
    L.imageOverlay('altis.webp', bounds).addTo(map);
    map.fitBounds(bounds);

    let interMode = 'ADD', currentType = 'Infantry', currentColor = '#00ff41', currentSize = 40;
    let pointsBuffer = [], renderedMarkers = {}, isSaving = false;

    const iconFiles = {
        'Infantry': { blue: 'Icons/Infantry.png', red: 'Icons/Infantry2.png' },
        'Vehicule': { blue: 'Icons/Vehicule.png', red: 'Icons/Vehicule2.png' },
        'HeavyArmor': { blue: 'Icons/HeavyArmor.png', red: 'Icons/HeavyArmor2.png' },
        'Attackhelicopter': { blue: 'Icons/Attackhelicopter.png', red: 'Icons/Attackhelicopter2.png' },
        'Dead': { any: 'Icons/Dead.png' }
    };

    function updateStatus(t) { document.getElementById('status').innerText = t; }

    function setInterMode(m) {
        interMode = m;
        ['btn-add', 'btn-edit', 'btn-del'].forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(`btn-${m.toLowerCase()}`).classList.add('active');
        load(); // Re-render pour activer/désactiver l'interactivité
    }

    function setType(t, b) {
        currentType = t;
        document.querySelectorAll('.icon-btn, .btn-util').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        pointsBuffer = [];
        updateStatus(`OUTIL : ${t.toUpperCase()}`);
    }

    function setColor(c, el) {
        currentColor = c;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
    }

    // --- SYNC RAPIDE ---
    async function load() {
        if (isSaving) return;
        try {
            const res = await fetch('/pings');
            const data = await res.json();
            
            const currentIds = data.map(p => p.id.toString());
            
            // 1. Supprimer ce qui n'existe plus
            Object.keys(renderedMarkers).forEach(id => {
                if (!currentIds.includes(id)) {
                    map.removeLayer(renderedMarkers[id]);
                    delete renderedMarkers[id];
                }
            });

            // 2. Ajouter/Mettre à jour
            data.forEach(p => {
                const id = p.id.toString();
                // Si le marker existe déjà, on ne fait rien (sauf si mode Edit change)
                if (renderedMarkers[id]) {
                    renderedMarkers[id].options.interactive = (interMode !== 'ADD');
                    return;
                }

                const parts = p.label ? p.label.split('|') : [];
                const color = parts[0] || '#00ff41';
                const size = parseInt(parts[1]) || 40;
                let layer;

                if (p.type === 'text') {
                    layer = L.marker([p.x, p.y], { icon: L.divIcon({ className: 'map-label', html: `<span style="color:${color}">${parts[2]}</span>` })});
                } else if (p.points_json) {
                    const pts = JSON.parse(p.points_json);
                    layer = (p.type === 'zone') ? L.polygon(pts, {color: color, fillOpacity: 0.3}) : L.polyline(pts, {color: color, weight: 4});
                } else if (p.type === 'Dot') {
                    layer = L.circleMarker([p.x, p.y], { radius: 6, color: color, fillColor: color, fillOpacity: 1 });
                } else if (iconFiles[p.type]) {
                    const img = iconFiles[p.type].any || (color === '#ff3e3e' ? iconFiles[p.type].red : iconFiles[p.type].blue);
                    layer = L.marker([p.x, p.y], { icon: L.icon({ iconUrl: img, iconSize: [size, size*0.75] }) });
                }

                if (layer) {
                    layer.on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        if (interMode === 'DEL') del(p.id);
                    });
                    layer.addTo(map);
                    renderedMarkers[id] = layer;
                }
            });
        } catch (e) { console.error("Sync error"); }
    }

    async function save(obj) {
        isSaving = true;
        updateStatus("SYNC...");
        const res = await fetch('/pings', { method: 'POST', body: JSON.stringify(obj) });
        if (res.ok) {
            updateStatus("OK");
            isSaving = false;
            await load(); 
        }
    }

    async function del(id) {
        await fetch(`/pings?id=${id}`, { method: 'DELETE' });
        load();
    }

    async function clearAll() {
        if(confirm("WIPE?")) { await fetch('/pings?id=all', { method: 'DELETE' }); load(); }
    }

    map.on('click', e => {
        if (interMode !== 'ADD') return;
        const pos = [e.latlng.lat, e.latlng.lng];
        if (currentType === 'text') {
            const t = prompt("Texte:");
            if(t) save({ x: pos[0], y: pos[1], type: 'text', label: `${currentColor}|${currentSize}|${t}` });
        } else if (['arrow', 'zone'].includes(currentType)) {
            pointsBuffer.push(pos);
            if (pointsBuffer.length >= (currentType === 'arrow' ? 2 : 3)) {
                if(currentType === 'arrow' || confirm("Terminer la zone ?")) {
                    save({ type: currentType, points_json: JSON.stringify(pointsBuffer), label: `${currentColor}|${currentSize}` });
                    pointsBuffer = [];
                }
            }
        } else {
            save({ x: pos[0], y: pos[1], type: currentType, label: `${currentColor}|${currentSize}` });
        }
    });

    setInterval(load, 1000); // 1 seconde pour une sensation de direct
</script>
</body>
</html>
