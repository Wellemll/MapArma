<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TACTICAL HQ | Altis Edit</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --primary: #00ff41; --danger: #ff3e3e; --bg: #080a0c; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: sans-serif; color: white; overflow: hidden; }
        #app-container { display: flex; height: 100vh; }
        #sidebar { width: 250px; background: #0d1117; border-right: 1px solid var(--primary); padding: 20px; display: flex; flex-direction: column; z-index: 1001; }
        #map { flex-grow: 1; background: #000; }
        
        .logo { color: var(--primary); font-weight: bold; text-align: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .type-btn { width: 100%; padding: 10px; margin-bottom: 5px; background: #1f2937; border: 1px solid #333; color: white; cursor: pointer; text-align: left; }
        .type-btn:hover { border-color: var(--primary); }
        .type-btn.active { background: var(--primary); color: black; font-weight: bold; }
        
        #draw-controls { 
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); 
            z-index: 2000; display: none; background: rgba(0,0,0,0.9); padding: 15px; 
            border: 2px solid var(--primary); border-radius: 5px;
        }
        .save-btn { background: var(--primary); color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .clear-btn { margin-top: auto; padding: 10px; background: var(--danger); color: white; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="draw-controls">
    <span id="draw-text">MODE DESSIN ACTIF</span>
    <button class="save-btn" onclick="finishDrawing()">💾 SAUVEGARDER LE TRACÉ</button>
</div>

<div id="app-container">
    <div id="sidebar">
        <div class="logo">ALTIS // HQ</div>
        <button class="type-btn active" onclick="setType('infantry', this)">👤 INFANTERIE</button>
        <button class="type-btn" onclick="setType('vehicle', this)">🚜 VÉHICULE</button>
        <button class="type-btn" onclick="setType('enemy', this)">⚠️ ENNEMI</button>
        <hr style="width:100%; border:0; border-top:1px solid #333; margin:15px 0;">
        <button class="type-btn" onclick="setType('arrow', this)">➔ FLÈCHE</button>
        <button class="type-btn" onclick="setType('zone', this)">⬢ ZONE</button>
        <button class="clear-btn" onclick="clearAll()">WIPE ALL DATA</button>
    </div>
    <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 2, zoomControl: false });
    const imageBounds = [[0, 0], [1512, 2048]];
    L.imageOverlay('altis.webp', imageBounds).addTo(map);
    map.fitBounds(imageBounds);

    let currentType = 'infantry';
    let drawPoints = [];
    let tempLayer = null;

    function setType(type, btn) {
        currentType = type;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Afficher/Masquer les contrôles de dessin
        const isDrawing = (type === 'arrow' || type === 'zone');
        document.getElementById('draw-controls').style.display = isDrawing ? 'block' : 'none';
        
        // Reset dessin en cours
        drawPoints = [];
        if(tempLayer) map.removeLayer(tempLayer);
    }

    async function loadData() {
        const res = await fetch('/pings');
        const data = await res.json();
        
        // On nettoie tout sauf l'image de fond
        map.eachLayer(l => {
            if (l instanceof L.Marker || l instanceof L.Polyline || l instanceof L.Polygon) {
                if(!l._url) map.removeLayer(l); // Ne pas supprimer l'imageOverlay
            }
        });

        data.forEach(p => {
            let layer;
            const popup = `<button onclick="deleteItem(${p.id})" style="background:red;color:white;border:none;width:100%;padding:5px;cursor:pointer">SUPPRIMER</button>`;
            
            if (p.points_json) {
                const pts = JSON.parse(p.points_json);
                layer = (p.type === 'zone') ? L.polygon(pts, {color: '#00ff41'}) : L.polyline(pts, {color: '#00ff41'});
            } else if (p.x && p.y) {
                layer = L.marker([p.x, p.y]);
            }
            
            if(layer) layer.addTo(map).bindPopup(popup);
        });
    }

    map.on('click', e => {
        if (currentType === 'arrow' || currentType === 'zone') {
            drawPoints.push([e.latlng.lat, e.latlng.lng]);
            if (tempLayer) map.removeLayer(tempLayer);
            tempLayer = (currentType === 'arrow') ? L.polyline(drawPoints, {color: 'white', dashArray: '5, 10'}) : L.polygon(drawPoints, {color: 'white', dashArray: '5, 10'});
            tempLayer.addTo(map);
        } else {
            saveItem({ x: e.latlng.lat, y: e.latlng.lng, type: currentType, label: 'Unité' });
        }
    });

    async function finishDrawing() {
        if (drawPoints.length < 2) { alert("Placez au moins 2 points !"); return; }
        await saveItem({ type: currentType, points_json: JSON.stringify(drawPoints) });
        drawPoints = [];
        if(tempLayer) map.removeLayer(tempLayer);
        showToast("TRACÉ ENREGISTRÉ");
    }

    async function saveItem(obj) {
        await fetch('/pings', { method: 'POST', body: JSON.stringify(obj) });
        loadData();
    }

    async function deleteItem(id) {
        await fetch(`/pings?id=${id}`, { method: 'DELETE' });
        loadData();
    }

    async function clearAll() {
        if(confirm("Voulez-vous tout effacer ?")) {
            await fetch('/pings?id=all', { method: 'DELETE' });
            loadData();
        }
    }

    function showToast(m) { console.log(m); } // Optionnel

    loadData();
    setInterval(loadData, 5000); // Sync toutes les 5 sec
</script>
</body>
</html>
