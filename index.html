<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Map-Arma3 | Altis</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #00ff41; --blue: #00d2ff; --red: #ff3e3e; --orange: #ff9d00; --black: #111; --bg: #05070a; 
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; }
        #app { display: flex; height: 100vh; }
        #sidebar { width: 260px; background: rgba(13, 17, 23, 0.95); border-right: 1px solid #1a222d; padding: 20px; display: flex; flex-direction: column; z-index: 1001; }
        .header { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.1rem; text-align: center; margin-bottom: 20px; letter-spacing: 2px; }
        .section-label { font-size: 0.65rem; color: #555; text-transform: uppercase; margin: 15px 0 8px; font-weight: bold; }
        
        .btn { width: 100%; padding: 10px; margin-bottom: 5px; border: 1px solid #2a3544; background: rgba(255,255,255,0.03); color: #8892b0; cursor: pointer; font-size: 0.75rem; border-radius: 4px; text-align: left; }
        .btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 255, 65, 0.1); }

        /* Palette de couleurs */
        .color-picker { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-bottom: 20px; }
        .color-dot { height: 30px; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .color-dot:hover { transform: scale(1.1); }
        .color-dot.active { border-color: white; box-shadow: 0 0 10px rgba(255,255,255,0.5); }

        #map { flex-grow: 1; background: #000; position: relative; }
        .status-bar { position: absolute; bottom: 20px; right: 20px; background: rgba(13, 17, 23, 0.9); padding: 8px 15px; border: 1px solid var(--primary); font-size: 0.6rem; color: var(--primary); z-index: 1001; }
        .del-btn { background: var(--red); color: white; border: none; width: 100%; padding: 5px; cursor: pointer; font-family: 'JetBrains Mono'; }
        .clear-all { margin-top: auto; color: var(--red); border: 1px solid var(--red); background: transparent; padding: 10px; cursor: pointer; font-size: 0.7rem; }
    </style>
</head>
<body>

<div id="app">
    <div id="sidebar">
        <div class="header">Arma3 // ALTIS</div>
        
        <div class="section-label">1. Choisir Couleur</div>
        <div class="color-picker">
            <div class="color-dot active" style="background: var(--primary);" onclick="setColor('#00ff41', this)"></div>
            <div class="color-dot" style="background: var(--blue);" onclick="setColor('#00d2ff', this)"></div>
            <div class="color-dot" style="background: var(--red);" onclick="setColor('#ff3e3e', this)"></div>
            <div class="color-dot" style="background: var(--orange);" onclick="setColor('#ff9d00', this)"></div>
            <div class="color-dot" style="background: #222; border: 1px solid #444;" onclick="setColor('#111111', this)"></div>
        </div>

        <div class="section-label">2. Outils</div>
        <button class="btn active" onclick="setType('inf_blue', this)">[||] UNITÉ</button>
        <button class="btn" onclick="setType('arrow', this)">➔ FLÈCHE (2 CLICS)</button>
        <button class="btn" onclick="setType('zone', this)">⬢ ZONE (3 CLICS)</button>

        <button class="clear-all" onclick="clearAll()">RESET TERMINAL</button>
    </div>
    
    <div id="map"></div>
    <div class="status-bar" id="status">Système Opérationnel</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 2, zoomControl: false });
    const bounds = [[0, 0], [1512, 2048]];
    L.imageOverlay('altis.webp', bounds).addTo(map);
    map.fitBounds(bounds);

    let currentType = 'inf_blue';
    let currentColor = '#00ff41'; // Vert par défaut
    let pointsBuffer = [];

    function setColor(color, el) {
        currentColor = color;
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        el.classList.add('active');
        updateStatus(`Couleur : ${color}`);
    }

    function setType(t, b) {
        currentType = t;
        document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        pointsBuffer = [];
        updateStatus(`Outil : ${t}`);
    }

    function updateStatus(text) {
        document.getElementById('status').innerText = text;
    }

    async function load() {
        try {
            const res = await fetch('/pings');
            const data = await res.json();
            
            map.eachLayer(l => {
                if (l instanceof L.Marker || l instanceof L.CircleMarker || l instanceof L.Polyline || l instanceof L.Polygon) {
                    if(!l._url) map.removeLayer(l);
                }
            });

            data.forEach(p => {
                // On utilise p.label pour stocker la couleur si c'est une flèche ou zone
                // Si p.label est vide ou ne commence pas par #, on met une couleur par défaut
                const color = (p.label && p.label.startsWith('#')) ? p.label : (p.type.includes('blue') ? '#00d2ff' : (p.type.includes('red') ? '#ff3e3e' : '#00ff41'));
                const popup = `<button class="del-btn" onclick="del(${p.id})">SUPPRIMER</button>`;
                
                if (p.points_json) {
                    const pts = JSON.parse(p.points_json);
                    if (p.type === 'zone') {
                        L.polygon(pts, {color: color, weight: 2, fillOpacity: 0.3}).addTo(map).bindPopup(popup);
                    } else {
                        L.polyline(pts, {color: color, weight: 4, opacity: 0.8}).addTo(map).bindPopup(popup);
                    }
                } else {
                    L.circleMarker([p.x, p.y], {
                        radius: 7, color: color, weight: 2, fillOpacity: 0.9, fillColor: color
                    }).addTo(map).bindPopup(popup);
                }
            });
        } catch(e) { console.error("Erreur sync"); }
    }

    map.on('click', e => {
        const pos = [e.latlng.lat, e.latlng.lng];
        
        if (currentType === 'arrow' || currentType === 'zone') {
            pointsBuffer.push(pos);
            const limit = currentType === 'arrow' ? 2 : 3;
            updateStatus(`${currentType}: ${pointsBuffer.length}/${limit}`);
            
            if (pointsBuffer.length === limit) {
                // On stocke currentColor dans le champ "label"
                save({ type: currentType, points_json: JSON.stringify(pointsBuffer), label: currentColor });
                pointsBuffer = [];
            }
        } else {
            // Unité simple avec sa couleur choisie
            save({ x: pos[0], y: pos[1], type: currentType, label: currentColor });
        }
    });

    async function save(obj) {
        await fetch('/pings', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(obj) 
        });
        load();
    }

    async function del(id) {
        await fetch(`/pings?id=${id}`, { method: 'DELETE' });
        load();
    }

    async function clearAll() {
        if(confirm("Confirmer le WIPE complet ?")) {
            await fetch('/pings?id=all', { method: 'DELETE' });
            load();
        }
    }

    load();
    setInterval(load, 4000);
</script>
</body>
</html>
